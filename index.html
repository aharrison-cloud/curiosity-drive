async function callGemini(prompt, schema=null) {
  const key = CONFIG.GEMINI_API_KEY;
  if (!key || key.startsWith('YOUR_')) return null;
  try {
    const body = {contents:[{parts:[{text:prompt}]}]};
    if (schema) body.generationConfig = {responseMimeType:'application/json',responseSchema:schema};
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`,
      {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const data = await res.json();
    const text = data?.candidates?.[0]?.content?.parts?.[0]?.text||'';
    if (schema) { try{return JSON.parse(text);}catch{return null;} }
    return text;
  } catch(e) { console.error('Gemini error:',e); return null; }
}

const AI = {
  async question(topic,mode,diff) {

    return callGemini(`UK National Curriculum Year ${topic.year} science question about "${topic.name}". Points: ${topic.curriculumPoints.join(', ')}. Difficulty: ${diff}. ${mi} British English. JSON only.`,
      {type:'OBJECT',properties:{type:{type:'STRING',enum:['MULTIPLE_CHOICE','OPEN_TEXT']},text:{type:'STRING'},options:{type:'ARRAY',items:{type:'STRING'}},correctAnswer:{type:'STRING'},explanation:{type:'STRING'},hint:{type:'STRING'},tableData:{type:'OBJECT',properties:{headers:{type:'ARRAY',items:{type:'STRING'}},rows:{type:'ARRAY',items:{type:'ARRAY',items:{type:'STRING'}}}}},videoSearchTerm:{type:'STRING'},difficulty:{type:'STRING'}},required:['type','text','explanation','hint']});
  },
  async evaluate(question,answer) {
    const ci = question.mode==='COMMUNICATION'?'Give feedback as "🧪 Science: [comment]. ✍️ Writing Tip: [advice]."':'';
    return callGemini(`Question: "${question.text}"\nRef: "${question.correctAnswer||question.explanation}"\nAnswer: "${answer}"\nMode: ${question.mode}\nEvaluate UK Y5/6 rubric (Emerging 3 to Exceeding 7). British English. ${ci}`,
      {type:'OBJECT',properties:{isCorrect:{type:'BOOLEAN'},feedback:{type:'STRING'},grade:{type:'STRING'}}});
  },
  async insights(student) {
    const d = await callGemini(`UK Y5/6 Science teacher analysis.\nStudent: ${student.name}, Grade: ${student.currentGrade}, Mastery: ${JSON.stringify(student.mastery)}, Help: ${student.helpUsageCount}.\nBritish English. Summary, 2 strengths, 2 weaknesses, 3 steps each with resourceType (VIDEO/ARTICLE/WORKSHEET), resourceTitle, resourceSearchTerm.`,

  async challenges(student) {
    const strong = Object.entries(student.mastery||{}).filter(([_,m])=>Object.values(m).some(s=>s>80)).map(([id])=>TOPICS.find(t=>t.id===id)?.name).filter(Boolean);

      {type:'ARRAY',items:{type:'OBJECT',properties:{title:{type:'STRING'},description:{type:'STRING'},type:{type:'STRING',enum:['COMPETITION','PROJECT','SCHOLARSHIP']},difficulty:{type:'STRING'},reason:{type:'STRING'},videoSearchTerm:{type:'STRING'},articleSearchTerm:{type:'STRING'},thoughtQuestions:{type:'ARRAY',items:{type:'STRING'}},researchQuestions:{type:'ARRAY',items:{type:'STRING'}}}}}) || [];
  },
  async textbook(topic) {
    return callGemini(`Digital Textbook Chapter for UK National Curriculum Year ${topic.year} Science.\nTopic: ${topic.name}. Points: ${topic.curriculumPoints.join(', ')}.\nAudience: Year ${topic.year} (9-11 yrs). British English. Engaging tone.\nProvide: title, introduction, 3-4 sections (title+content), keyConcepts (array), summary.`,
      {type:'OBJECT',properties:{title:{type:'STRING'},introduction:{type:'STRING'},sections:{type:'ARRAY',items:{type:'OBJECT',properties:{title:{type:'STRING'},content:{type:'STRING'}}}},keyConcepts:{type:'ARRAY',items:{type:'STRING'}},summary:{type:'STRING'}}});
  },
  async translate(text,lang) { return callGemini(`Translate this educational science text to ${lang} for a junior school student:\n"${text}"`); },
  async explain(concept) { return callGemini(`Explain "${concept}" to a 10-year-old in 2 sentences. British English.`); },
  async liveQuestions(content) {
    const prompt = `You are helping a UK Primary School science teacher run a live class quiz.
Based on the lesson content below, generate 5 Multiple Choice Questions to check student understanding.
Cover the key facts from the lesson. 4 options per question, one correct answer.
Questions must be appropriate for Year 5-6 students (age 9-11). British English.

Lesson Content: "${content.substring(0,3000)}"

IMPORTANT: Assign a unique simple id like "q1", "q2" etc to each question.
Return ONLY a JSON array, no other text.`;
    return callGemini(prompt,
      {type:'ARRAY',items:{type:'OBJECT',properties:{id:{type:'STRING'},text:{type:'STRING'},options:{type:'ARRAY',items:{type:'STRING'}},correctAnswer:{type:'STRING'}},required:['id','text','options','correctAnswer']}}) || [];

  }

// SIMPLE BAR CHART
// ═══════════════════════════════════════
function SimpleBarChart({data,labelKey,valueKey,color='#002046'}) {
  const max = Math.max(...data.map(d=>d[valueKey]),1);
  return (
    <div className="space-y-2">
      {data.map((d,i)=>(
        <div key={i} className="flex items-center gap-2">
          <span className="text-xs text-slate-500 w-20 flex-shrink-0 truncate">{d[labelKey]}</span>
          <div className="flex-1 bg-slate-100 rounded-full h-6 relative overflow-hidden">
            <div className="h-6 rounded-full flex items-center justify-end pr-2 transition-all" style={{width:`${Math.max((d[valueKey]/max)*100,d[valueKey]>0?10:0)}%`,backgroundColor:color}}>
              {d[valueKey]>0&&<span className="text-white text-xs font-bold">{d[valueKey]}</span>}
            </div>
          </div>
        </div>
      ))}
    </div>
  );
}

// QUIZ MODULE
// ═══════════════════════════════════════
function QuizModule({student,topic,mode,onExit,onComplete}) {
  const [q,setQ]=useState(null);
  const [loading,setLoading]=useState(true);
  const [sel,setSel]=useState('');
  const [text,setText]=useState('');
  const [result,setResult]=useState(null);
  const [hint,setHint]=useState(false);
  const [hintUsed,setHintUsed]=useState(false);
  const [qCount,setQCount]=useState(0);
  const [correct,setCorrect]=useState(0);
  const [diff,setDiff]=useState('medium');
  const [err,setErr]=useState('');

  useEffect(()=>{loadQ();},[]);

  const fallback = ()=>({type:'MULTIPLE_CHOICE',text:`Which of these relates to ${topic.name}?`,options:[topic.vocabulary[0]?.term||'A','B','C','D'],correctAnswer:topic.vocabulary[0]?.term||'A',explanation:topic.vocabulary[0]?.definition||'See your textbook.',hint:'Think about key vocabulary.',difficulty:'easy',videoSearchTerm:topic.videoSearchTerm});

  const loadQ = async()=>{
    setLoading(true);setResult(null);setSel('');setText('');setHint(false);setHintUsed(false);setErr('');
    try { const res=await AI.question(topic,mode,diff); setQ(res||fallback()); }
    catch(e){setErr('Using fallback question.');setQ(fallback());}
    setLoading(false);
  };

  const submit = async()=>{
    if (!q) return; setLoading(true);
    let ok=false,fb='',grade='';
    if (q.type==='MULTIPLE_CHOICE') {
      ok=sel===q.correctAnswer; fb=ok?'✅ Excellent! That is correct.':'❌ Not quite. '+q.explanation; grade=ok?GradeBand.EXPECTED_PLUS:GradeBand.EXPECTED_MINUS;
    } else {
      try { const ev=await AI.evaluate({...q,mode},text); if(ev){ok=ev.isCorrect;fb=ev.feedback;grade=ev.grade;} else{ok=true;fb='Good effort! Keep practising.';grade=GradeBand.EXPECTED;} }
      catch{ok=true;fb='Could not evaluate — marked as attempted.';grade=GradeBand.EXPECTED;}
    }
    if(ok) setCorrect(c=>c+1);
    setQCount(c=>c+1);setResult({ok,fb,grade});setLoading(false);
    if(ok&&diff==='easy') setDiff('medium'); else if(ok&&diff==='medium') setDiff('hard');
    else if(!ok&&diff==='hard') setDiff('medium'); else if(!ok&&diff==='medium') setDiff('easy');
    try{await api.logActivity({email:student.email,studentName:student.name,topicId:topic.id,topicName:topic.name,mode,score:ok?100:0,usedHelp:hintUsed,grade});}catch{}
  };

  if (loading&&!result) return <div className="flex flex-col items-center justify-center h-96"><div className="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-indigo-600 mb-4"></div><p className="text-slate-500">Generating question ({diff})...</p></div>;

  return (
    <div className="max-w-3xl mx-auto p-4">
      <div className="flex items-center justify-between mb-6">
        <button onClick={onExit} className="text-slate-500 hover:text-slate-800 font-semibold flex items-center text-sm"><svg className="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>Abort Mission</button>
        <div className="flex gap-2">
          <span className="bg-slate-100 text-slate-700 text-xs font-bold px-3 py-1 rounded-full">Q{qCount+1} · {correct}/{qCount} ✓</span>
          <span className={`text-xs font-bold px-3 py-1 rounded-full ${diff==='easy'?'bg-green-100 text-green-800':diff==='medium'?'bg-yellow-100 text-yellow-800':'bg-red-100 text-red-800'}`}>{diff}</span>
        </div>
      </div>
      {err&&<div className="mb-4 p-3 bg-yellow-50 border border-yellow-200 rounded-xl text-xs text-yellow-800">⚠️ {err}</div>}
      <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-8 mb-5">
        <div className="inline-block text-xs font-bold px-3 py-1 rounded-full bg-slate-100 text-slate-700 mb-4">{topic.icon} {topic.name} · {mode.replace('_',' ')}</div>
        <h2 className="text-xl font-bold text-slate-800 mb-6 leading-relaxed">{q?.text}</h2>
        {q?.tableData&&(
          <div className="mb-5 overflow-x-auto"><table className="w-full text-sm border border-slate-200 rounded-xl overflow-hidden"><thead className="bg-slate-100"><tr>{q.tableData.headers?.map((h,i)=><th key={i} className="px-3 py-2 font-bold text-slate-700 text-left">{h}</th>)}</tr></thead><tbody>{q.tableData.rows?.map((row,ri)=><tr key={ri} className={ri%2===0?'bg-white':'bg-slate-50'}>{row.map((c,ci)=><td key={ci} className="px-3 py-2 text-slate-600">{c}</td>)}</tr>)}</tbody></table></div>
        )}
        {!result&&(q?.type==='MULTIPLE_CHOICE'?(
          <div className="space-y-3">{q.options?.map((opt,i)=><button key={i} onClick={()=>setSel(opt)} className={`w-full text-left p-4 rounded-xl border-2 font-medium transition-all ${sel===opt?'bg-indigo-50 border-indigo-400 text-indigo-800':'border-slate-200 hover:border-slate-300 hover:bg-slate-50'}`}><span className="font-bold mr-2">{String.fromCharCode(65+i)}.</span>{opt}</button>)}</div>
        ):(
          <textarea value={text} onChange={e=>setText(e.target.value)} className="w-full p-4 border-2 border-slate-200 rounded-xl focus:outline-none focus:border-indigo-400 min-h-32 resize-none text-sm" placeholder="Write your scientific explanation here..."/>
        ))}
        {hint&&!result&&<div className="mt-4 p-4 bg-amber-50 border border-amber-200 rounded-xl text-sm text-amber-800"><span className="font-bold">💡 Hint:</span> {q?.hint}</div>}
      </div>
      {!result?(
        <div className="flex items-center justify-between">
          <button onClick={()=>{setHintUsed(true);setHint(true);}} disabled={hint} className={`text-sm font-bold px-4 py-2 rounded-xl transition-colors ${hint?'text-slate-300':'text-amber-600 hover:bg-amber-50 border border-amber-200'}`}>💡 Hint{hintUsed?' (used)':''}</button>
          <button onClick={submit} disabled={!sel&&!text.trim()} className="bg-[#002046] text-white font-bold px-8 py-3 rounded-xl hover:bg-[#002d5c] disabled:opacity-40 transition-colors">Submit Answer →</button>
        </div>
      ):(
        <div className={`rounded-2xl p-6 mb-4 ${result.ok?'bg-green-50 border border-green-200':'bg-red-50 border border-red-200'}`}>
          <p className="font-bold text-lg mb-2">{result.ok?'🎉 Well done!':'🔄 Keep going!'}</p>
          <p className="text-slate-700 whitespace-pre-line text-sm leading-relaxed">{result.fb}</p>
          {result.grade&&<p className="mt-3 text-xs font-bold text-slate-500">Grade: <span className={`px-2 py-0.5 rounded ${GRADE_COLOR[result.grade]||'bg-slate-100'}`}>{result.grade}</span></p>}
          {!result.ok&&q?.videoSearchTerm&&<div className="mt-4 p-3 bg-blue-50 rounded-xl border border-blue-200"><p className="text-xs font-bold text-blue-800 mb-1">📺 Watch a video to help:</p><a href={`https://www.youtube.com/results?search_query=${encodeURIComponent(q.videoSearchTerm)}`} target="_blank" rel="noopener noreferrer" className="text-xs text-blue-600 hover:underline">{q.videoSearchTerm}</a></div>}
          <div className="flex gap-3 mt-5">
            <button onClick={loadQ} className="flex-1 bg-[#002046] text-white font-bold py-3 rounded-xl hover:bg-[#002d5c]">Next Question →</button>
            <button onClick={()=>onComplete(Math.round((correct/Math.max(qCount,1))*100),qCount,correct)} className="px-6 py-3 rounded-xl border-2 border-slate-300 text-slate-600 font-bold hover:bg-slate-50">Finish</button>
          </div>
        </div>
      )}
    </div>
  );
}

function TopicSelector({student,onSelect}) {
  const [picked,setPicked]=useState(null);

  if (picked) return (
    <div className="p-6 max-w-5xl mx-auto">
      <button onClick={()=>setPicked(null)} className="text-slate-500 hover:text-indigo-600 mb-6 flex items-center text-sm font-semibold"><svg className="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 19l-7-7 7-7"/></svg>Back to Topics</button>
      <div className="text-center mb-8"><span className="text-6xl block mb-3">{picked.icon}</span><h2 className="text-3xl font-bold text-slate-800 font-serif">{picked.name}</h2><p className="text-slate-500 mt-2 max-w-xl mx-auto">{picked.description}</p></div>
      <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5">
        {[{m:'CONTENT',icon:'📚',label:'Content Practice',color:'blue'},{m:'COMMUNICATION',icon:'🗣️',label:'Communication',color:'purple'},{m:'SCIENTIFIC',icon:'🔬',label:'Working Scientifically',color:'green'},{m:'DATA_ANALYSIS',icon:'📊',label:'Data Interpretation',color:'amber'}].map(({m,icon,label,color})=>{
          const score=student.mastery?.[picked.id]?.[m]||0;
          return <button key={m} onClick={()=>onSelect(picked,m)} className={`p-6 bg-white border-2 border-slate-100 rounded-2xl hover:border-${color}-400 hover:shadow-lg transition-all text-left group`}>
            <div className={`w-12 h-12 bg-${color}-100 text-${color}-600 rounded-full flex items-center justify-center mb-3 text-2xl group-hover:scale-110 transition-transform`}>{icon}</div>
            <h4 className="text-sm font-bold text-slate-800 mb-1">{label}</h4>
            {score>0&&<><div className="w-full bg-slate-100 rounded-full h-1.5 mt-2"><div className={`bg-${color}-500 h-1.5 rounded-full`} style={{width:`${score}%`}}></div></div><p className="text-xs text-slate-400 mt-1">Best: {score}%</p></>}
          </button>;
        })}
      </div>
    </div>
  );

  const Grid=({topics,title})=>(
    <div className="mb-8">
      <h3 className="text-xl font-bold text-slate-700 mb-4 pl-3 border-l-4 border-indigo-500">{title}</h3>
      <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
        {topics.map(t=>{const avg=getAvg(t.id);return(
          <button key={t.id} onClick={()=>setPicked(t)} className="group relative bg-white rounded-xl shadow-sm hover:shadow-xl transition-all duration-300 p-5 text-left border border-slate-100 hover:border-indigo-300 overflow-hidden">
            <div className="absolute top-0 right-0 p-3 opacity-10 group-hover:opacity-20 text-5xl">{t.icon}</div>
            <div className="relative z-10">
              <span className="text-3xl mb-2 block">{t.icon}</span>
              <h4 className="font-bold text-slate-800 text-sm mb-1">{t.name}</h4>
              <p className="text-xs text-slate-400 line-clamp-2 mb-2">{t.description}</p>
              {avg>0?<><div className="w-full bg-slate-100 rounded-full h-1.5"><div className="bg-indigo-500 h-1.5 rounded-full" style={{width:`${avg}%`}}></div></div><span className="text-xs text-indigo-600 font-bold">{avg}% mastery</span></>:<span className="text-xs text-slate-400">Not started</span>}
            </div>
          </button>
        );})}
      </div>

  );

  return (
    <div className="p-6 max-w-6xl mx-auto">
      <h2 className="text-2xl font-bold text-slate-800 mb-6 font-serif">Choose Your Topic</h2>

  );
}

function Textbook({student,onExit}) {
  const [picked,setPicked]=useState(null);
  const [chapter,setChapter]=useState(null);
  const [loading,setLoading]=useState(false);
  const [lang,setLang]=useState('English');
  const [trans,setTrans]=useState({});
  const [expln,setExpln]=useState({});

  const load = async(t)=>{setPicked(t);setLoading(true);setChapter(null);setTrans({});try{setChapter(await AI.textbook(t));}catch{}setLoading(false);};
  const doTrans = async(l)=>{setLang(l);if(!chapter||l==='English')return;try{const i=await AI.translate(chapter.introduction,l);setTrans(p=>({...p,intro:i}));for(let x=0;x<chapter.sections.length;x++){const s=await AI.translate(chapter.sections[x].content,l);setTrans(p=>({...p,[x]:s}));}}catch{}};
  const doExplain = async(term)=>{const e=await AI.explain(term);setExpln(p=>({...p,[term]:e}));};
  const get=(key,orig)=>lang==='English'?orig:(trans[key]||orig);
  const getAvg=id=>{const m=student.mastery?.[id];if(!m)return 0;const v=Object.values(m);return Math.round(v.reduce((a,b)=>a+b,0)/v.length);};

  if (!picked) return (
    <div className="p-6 max-w-5xl mx-auto">
      <div className="flex items-center justify-between mb-6">
        <button onClick={onExit} className="text-slate-500 hover:text-slate-800 flex items-center font-semibold text-sm"><svg className="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 19l-7-7 7-7"/></svg>Back</button>
        <h2 className="text-2xl font-bold text-[#002046] font-serif">📖 Digital Textbook</h2><div/>
      </div>
      <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
        {TOPICS.map(t=>{const avg=getAvg(t.id);return(
          <button key={t.id} onClick={()=>load(t)} className="bg-white rounded-xl p-5 border border-slate-200 hover:border-[#002046] hover:shadow-md transition-all text-left">
            <span className="text-3xl block mb-2">{t.icon}</span>
            <h4 className="font-bold text-sm text-slate-800">{t.name}</h4>
            <span className="text-xs text-slate-400">Year {t.year}</span>
            {avg>0&&<div className="mt-2 w-full bg-slate-100 rounded-full h-1"><div className="bg-indigo-500 h-1 rounded-full" style={{width:`${avg}%`}}></div></div>}
          </button>
        );})}
      </div>
    </div>
  );

  if (loading) return <div className="flex flex-col items-center justify-center h-96"><div className="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-indigo-600 mb-4"></div><p className="text-slate-500">Generating chapter for {picked.name}...</p></div>;
  if (!chapter) return <div className="text-center p-8">Failed to load. <button onClick={()=>setPicked(null)} className="text-blue-500 underline">Go back</button></div>;

  return (
    <div className="max-w-4xl mx-auto p-4">
      <div className="flex items-center justify-between mb-4 sticky top-0 bg-white/95 backdrop-blur py-3 px-4 rounded-xl shadow-sm border border-slate-100 z-10">
        <button onClick={()=>setPicked(null)} className="text-slate-500 hover:text-slate-800 flex items-center font-semibold text-sm"><svg className="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 19l-7-7 7-7"/></svg>Topics</button>
        <div className="flex items-center gap-2 flex-wrap">
          <span className="text-xs text-slate-500 font-bold">Translate:</span>
          {['English','Korean','Chinese'].map(l=><button key={l} onClick={()=>doTrans(l)} className={`px-3 py-1 rounded-full text-xs font-bold border transition-colors ${lang===l?'bg-[#002046] text-white border-[#002046]':'border-slate-300 text-slate-600 hover:border-[#002046]'}`}>{l}</button>)}
        </div>
      </div>
      <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden mb-5">
        <div className="bg-[#002046] text-white p-8"><span className="text-4xl block mb-3">{picked.icon}</span><h1 className="text-3xl font-bold font-serif mb-2">{chapter.title}</h1><p className="text-blue-200 leading-relaxed">{get('intro',chapter.introduction)}</p></div>
        <div className="p-8">
          {chapter.sections?.map((s,i)=>(
            <div key={i} className="mb-8">
              <h2 className="text-xl font-bold text-[#002046] mb-3 font-serif flex items-center"><span className="w-8 h-8 bg-[#C5A059] text-white rounded-full flex items-center justify-center text-sm font-bold mr-3 flex-shrink-0">{i+1}</span>{s.title}</h2>
              <p className="text-slate-700 leading-relaxed">{get(i,s.content)}</p>

// AI — extended for live session
// ═══════════════════════════════════════
async function getStudentPersonalFeedback(studentEmail, questions, responses, content) {
  const studentResponses = responses.filter(r => r.studentId === studentEmail);
  const score = studentResponses.filter(r => {
    const q = questions.find(q => q.id === r.questionId);
    return q && r.answer === q.correctAnswer;
  }).length;
  const total = questions.length;
  const missed = questions.filter(q => {
    const r = studentResponses.find(r => r.questionId === q.id);
    return !r || r.answer !== q.correctAnswer;
  }).map(q => q.text);

  return callGemini(
    `A Year 5/6 student just completed a live class quiz.\nLesson topic: "${content.substring(0,300)}"\nScore: ${score}/${total}\nQuestions they got wrong: ${missed.join('; ')||'None'}\n\nGive a short personalised message (3-4 sentences) that:\n1. Acknowledges their score positively\n2. Identifies their specific gap if any\n3. Gives ONE specific next step (e.g. watch a video, try a practice)\nBritish English. Encouraging tone. Address them as "you".`
  );
}

// STUDENT LIVE SESSION (upgraded)
// ═══════════════════════════════════════
function StudentLive({student,onExit}) {
  const [session,setSession] = useState(null);
  const [answered,setAnswered] = useState({});
  const [loading,setLoading] = useState(true);
  const [personalFeedback,setPersonalFeedback] = useState('');
  const [loadingFeedback,setLoadingFeedback] = useState(false);


  useEffect(()=>{
    const poll = async () => {
      try {
        const r = await api.getLiveSession();
        if (r?.session) setSession(r.session);
      } catch {}
    };
    poll();
    const iv = setInterval(poll, 4000);
    setLoading(false);
    return () => clearInterval(iv);
  },[]);

  const answer = async(qId, ans) => {
    setAnswered(p => ({...p,[qId]:ans}));
    if (session) {
      const s = {...session, studentResponses:[...(session.studentResponses||[]),{studentId:student.email,questionId:qId,answer:ans}]};
      setSession(s);
      try { await api.updateLiveSession(s); } catch {}
    }
  };

  const loadPersonalFeedback = async () => {
    if (!session) return;
    setLoadingFeedback(true);
    const fb = await getStudentPersonalFeedback(student.email, session.questions||[], session.studentResponses||[], session.content||'');
    setPersonalFeedback(fb||'Great effort today! Keep practising to strengthen your understanding.');
    setLoadingFeedback(false);
  };

  // No slide display needed — teacher shows PPT on projector

  if (loading) return (
    <div className="flex items-center justify-center h-96">
      <div className="animate-spin rounded-full h-12 w-12 border-t-4 border-b-4 border-[#002046]"></div>
    </div>
  );

  if (!session?.isActive) return (
    <div className="flex flex-col items-center justify-center h-96 text-center p-6">
      <span className="text-6xl mb-4 animate-pulse">📡</span>
      <h2 className="text-2xl font-bold text-[#002046] mb-2 font-serif">Waiting for your teacher...</h2>
      <p className="text-slate-500 mb-2">Stay on this page — your teacher will start the session shortly.</p>
      <p className="text-xs text-slate-400 mb-6">This page updates automatically every 4 seconds.</p>
      <button onClick={onExit} className="text-sm text-slate-400 underline hover:text-slate-600">Leave session</button>
    </div>
  );

  // CONTENT VIEW — teacher is presenting on projector, students wait
  if (session.currentStage==='CONTENT_VIEW') {
    return (
      <div className="max-w-lg mx-auto p-6 text-center">
        <div className="bg-white rounded-3xl shadow-xl border border-slate-200 p-10">
          <div className="flex items-center justify-center mb-6">
            <span className="w-3 h-3 bg-red-500 rounded-full animate-pulse mr-2"></span>
            <span className="text-xs font-bold text-red-600 uppercase tracking-wider">Live Lesson</span>
          </div>
          <span className="text-6xl block mb-5">👀</span>
          <h2 className="text-2xl font-bold text-[#002046] mb-3 font-serif">Lesson in Progress</h2>
          <p className="text-slate-600 mb-2">Watch the projector screen and listen carefully.</p>
          <p className="text-slate-400 text-sm mb-6">Your teacher will launch the quiz when ready — this page will update automatically.</p>
          <div className="bg-amber-50 rounded-2xl p-4 border border-amber-100">
            <p className="text-amber-800 text-sm font-bold">📝 Top tip: Take notes now — they will help you answer the quiz!</p>
          </div>
        </div>
      </div>
    );
  }

  // QUIZ VIEW
  const unanswered = (session.questions||[]).filter(q => !answered[q.id]);
  const currentQ = unanswered[0];
  const allDone = (session.questions||[]).length > 0 && unanswered.length === 0;
  const score = Object.keys(answered).filter(qId => {
    const q = (session.questions||[]).find(x => x.id===qId);
    return q && answered[qId]===q.correctAnswer;
  }).length;

  if (session.currentStage==='QUIZ' && currentQ) return (
    <div className="max-w-2xl mx-auto p-4">
      <div className="flex items-center justify-between mb-4">
        <div className="flex items-center">
          <span className="w-3 h-3 bg-red-500 rounded-full animate-pulse mr-2"></span>
          <span className="text-xs font-bold text-red-600 uppercase">Live Quiz</span>
        </div>
        <span className="text-xs text-slate-500 font-bold">Question {Object.keys(answered).length+1} of {session.questions.length}</span>
      </div>

      {/* Progress bar */}
      <div className="w-full bg-slate-100 rounded-full h-2 mb-5">
        <div className="bg-[#002046] h-2 rounded-full transition-all" style={{width:`${Math.round(Object.keys(answered).length/session.questions.length*100)}%`}}></div>
      </div>

      <div className="bg-white rounded-2xl shadow border border-slate-200 p-6 mb-4">
        <h2 className="text-xl font-bold text-slate-800 mb-5 leading-relaxed">{currentQ.text}</h2>
        <div className="space-y-3">
          {currentQ.options?.map((opt,i) => (
            <button key={i} onClick={()=>answer(currentQ.id,opt)} className="w-full text-left p-4 rounded-xl border-2 border-slate-200 hover:border-[#002046] hover:bg-blue-50 font-medium transition-all group">
              <span className="inline-flex w-7 h-7 rounded-full bg-slate-100 group-hover:bg-[#002046] group-hover:text-white items-center justify-center font-bold text-sm mr-3 transition-colors">{String.fromCharCode(65+i)}</span>
              {opt}
            </button>
          ))}
        </div>
      </div>
    </div>
  );

  // WAITING
  if (session.currentStage==='WAITING') return (
    <div className="flex flex-col items-center justify-center h-96 text-center p-6">
      <span className="text-5xl mb-4">⏸️</span>
      <h2 className="text-xl font-bold text-[#002046] mb-2 font-serif">Paused</h2>
      <p className="text-slate-500">Your teacher has paused the session. Stay on this page!</p>
    </div>
  );

  // ENDED / ALL DONE
  if (allDone || session.currentStage==='ENDED') return (
    <div className="max-w-lg mx-auto p-4">
      <div className="bg-white rounded-3xl shadow-xl border border-slate-200 p-8 text-center mb-4">
        <span className="text-6xl block mb-4">{score===session.questions?.length?'🏆':score>=(session.questions?.length/2)?'👏':'💪'}</span>
        <h2 className="text-2xl font-bold text-[#002046] mb-2 font-serif">Session Complete!</h2>
        <p className="text-slate-600 mb-2">You scored <strong>{score}</strong> out of <strong>{session.questions?.length}</strong></p>
        <div className="w-full bg-slate-100 rounded-full h-4 mb-4">
          <div className={`h-4 rounded-full transition-all ${score===session.questions?.length?'bg-emerald-500':score>=(session.questions?.length/2)?'bg-[#002046]':'bg-amber-500'}`}
            style={{width:`${session.questions?.length?Math.round(score/session.questions.length*100):0}%`}}></div>
        </div>
        <p className="text-sm font-bold text-slate-500">{Math.round(score/(session.questions?.length||1)*100)}%</p>
      </div>

      {/* Personal AI Feedback */}
      <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 mb-4">
        <h3 className="font-bold text-[#002046] mb-3 font-serif">🎯 Your Personal Feedback</h3>
        {personalFeedback ? (
          <p className="text-slate-700 text-sm leading-relaxed">{personalFeedback}</p>
        ) : (
          <button onClick={loadPersonalFeedback} disabled={loadingFeedback} className="w-full bg-indigo-50 hover:bg-indigo-100 text-indigo-700 font-bold py-3 rounded-xl text-sm transition-colors disabled:opacity-50">
            {loadingFeedback ? '✨ Generating your personal feedback...' : '✨ Get My Personal AI Feedback'}
          </button>
        )}
      </div>

      {/* Next steps based on score */}
      <div className={`rounded-2xl p-4 mb-4 border ${score===session.questions?.length?'bg-emerald-50 border-emerald-200':score>=(session.questions?.length/2)?'bg-blue-50 border-blue-200':'bg-amber-50 border-amber-200'}`}>
        <h3 className="font-bold mb-2 text-sm">{score===session.questions?.length?'🌟 Outstanding! What\'s next?':score>=(session.questions?.length/2)?'📈 Good effort! Keep going:':'📚 Let\'s strengthen this topic:'}</h3>
        {score===session.questions?.length && <p className="text-sm">You mastered this lesson! Try a challenge quiz on this topic to push even further.</p>}
        {score>=(session.questions?.length/2) && score<session.questions?.length && <p className="text-sm">You understood most of the lesson. Review the questions you missed and try the textbook chapter for more detail.</p>}
        {score<(session.questions?.length/2) && <p className="text-sm">That's okay — everyone learns at their own pace. Read through the lesson content again and try the Digital Textbook for this topic.</p>}
      </div>

      <button onClick={onExit} className="w-full bg-[#002046] text-[#C5A059] font-bold py-3 rounded-xl hover:bg-[#002d5c]">Back to Dashboard</button>
    </div>
  );

  return (
    <div className="flex items-center justify-center h-96">
      <div className="animate-spin rounded-full h-12 w-12 border-t-4 border-b-4 border-[#002046]"></div>
    </div>
  );
}

// LIVE SESSION MANAGER (TEACHER — upgraded)

function LiveSessionManager({teacher,onExit}) {
  const [stage,setStage] = useState('UPLOAD');
  const [content,setContent] = useState('');
  const [fileName,setFileName] = useState('');
  const [loading,setLoading] = useState(false);
  const [session,setSession] = useState(null);
  const [qIdx,setQIdx] = useState(0);
  const [analysis,setAnalysis] = useState(null);
  const [showDrive,setShowDrive] = useState(false);
  const [dragOver,setDragOver] = useState(false);
  const [extracting,setExtracting] = useState(false);
  const fileRef = React.useRef(null);

  // Extract text from uploaded file
  const extractText = async(file) => {
    setExtracting(true);
    setFileName(file.name);
    try {
      const name = file.name.toLowerCase();
      if (name.endsWith('.txt')) {
        const text = await file.text();
        setContent(text);
      } else if (name.endsWith('.pdf')) {
        setContent(`[PDF: ${file.name}]\n\nPDF text extraction requires manual copy-paste. Please:\n1. Open the PDF\n2. Select All text (Ctrl/Cmd+A)\n3. Copy and paste it into the text box below.`);
      } else if (name.endsWith('.pptx')) {
        // Check JSZip is available
        if (typeof JSZip === 'undefined') {
          setContent(`[File: ${file.name}]\n\nFile reader not ready yet. Please wait a moment and try again.`);
        } else {
          const buffer = await file.arrayBuffer();
          const extracted = await extractPPTX(buffer, file.name);
          setContent(extracted);
        }
      } else if (name.endsWith('.ppt')) {
        setContent(`[File: ${file.name}]\n\nOlder .ppt format is not supported. Please save your file as .pptx (PowerPoint 2007 or later) and try again.`);
      } else if (name.endsWith('.docx') || name.endsWith('.doc')) {
        // Try reading docx as text
        const buffer = await file.arrayBuffer();
        try {
          const zip = await JSZip.loadAsync(buffer);
          const doc = await zip.files['word/document.xml']?.async('string');
          if (doc) {
            const matches = doc.match(/<w:t[^>]*>([^<]*)<\/w:t>/g) || [];
            const texts = matches.map(m => m.replace(/<[^>]*>/g,'').trim()).filter(t=>t.length>0);
            setContent(`[From: ${file.name}]\n\n` + texts.join(' '));
          } else {
            setContent(`[File: ${file.name}]\n\nCould not read document. Please paste content below.`);
          }
        } catch {
          setContent(`[File: ${file.name}]\n\nPlease paste your lesson content below.`);
        }
      } else {
        const text = await file.text().catch(()=>'');
        setContent(text || `[File: ${file.name}]\n\nPlease paste your lesson content in the text box below.`);
      }
    } catch(e) {
      setContent(`Could not read ${file.name}. Please paste your lesson content in the text box below.`);
    }
    setExtracting(false);
  };

  // Extract text from PPTX file (reads XML inside zip)
  const extractPPTX = async(buffer, name) => {
    try {
      // Use JSZip to properly unpack the PPTX ZIP archive
      const zip = await JSZip.loadAsync(buffer);
      
      // Get all slide XML files (sorted by slide number)
      const slideFiles = Object.keys(zip.files)
        .filter(f => f.match(/ppt\/slides\/slide[0-9]+\.xml$/))
        .sort((a, b) => {
          const na = parseInt(a.match(/slide(\d+)/)?.[1] || 0);
          const nb = parseInt(b.match(/slide(\d+)/)?.[1] || 0);
          return na - nb;
        });

      if (slideFiles.length === 0) {
        return `[File: ${name}]\n\nNo slides found. Please paste your lesson content below.`;
      }

      const slideTexts = [];
      for (let i = 0; i < slideFiles.length; i++) {
        const xml = await zip.files[slideFiles[i]].async('string');
        // Extract all text runs from the slide XML
        const matches = xml.match(/<a:t[^>]*>([^<]*)<\/a:t>/g) || [];
        const texts = matches
          .map(m => m.replace(/<[^>]*>/g, '').trim())
          .filter(t => t.length > 0);
        if (texts.length > 0) {
          slideTexts.push(`--- Slide ${i + 1} ---\n${texts.join(' ')}`);
        }
      }

      if (slideTexts.length > 0) {
        return `[From: ${name} — ${slideFiles.length} slides]\n\n` + slideTexts.join('\n\n');
      }
      return `[File: ${name}]\n\nSlides appear to be empty or image-only. Please paste your lesson content below.`;
    } catch(e) {
      console.error('PPTX extract error:', e);
      return `[File: ${name}]\n\nCould not read this file. Please paste your lesson content below.`;
    }
  };

  const handleDrop = (e) => {
    e.preventDefault(); setDragOver(false);
    const file = e.dataTransfer.files[0];
    if (file) extractText(file);
  };

  const handleFileInput = (e) => {
    const file = e.target.files[0];
    if (file) extractText(file);
  };

  const generate = async() => {
    if (!content.trim()) return;
    setLoading(true);
    const qs = await AI.liveQuestions(content);
    if (qs.length > 0) {
      const s = {isActive:true,content,questions:qs,currentStage:'CONTENT_VIEW',studentResponses:[]};
      await api.updateLiveSession(s);
      setSession(s);
      setStage('POLL');
    } else {
      alert('Could not generate questions. Please add more content to your lesson.');
    }
    setLoading(false);
  };

  const update = async(patch) => {
    const s = {...(session||{}), ...patch};
    setSession(s);
    try { await api.updateLiveSession(s); } catch {}
  };

  const analyze = async() => {

    const stats = (session?.questions||[]).map(q => ({
      question: q.text,
      correctAnswer: q.correctAnswer,
      correct: (session.studentResponses||[]).filter(r=>r.questionId===q.id&&r.answer===q.correctAnswer).length,
      total: (session.studentResponses||[]).filter(r=>r.questionId===q.id).length,
      responses: q.options?.map(opt=>({option:opt,count:(session.studentResponses||[]).filter(r=>r.questionId===q.id&&r.answer===opt).length}))
    }));
    const res = await AI.liveAnalysis(session?.questions||[], stats);
    setAnalysis(res);
    setStage('ANALYSIS');
    setLoading(false);
  };

  const results = () => (session?.questions?.[qIdx]?.options||[]).map(opt=>({
    option:opt,
    count:(session.studentResponses||[]).filter(r=>r.questionId===session.questions[qIdx]?.id&&r.answer===opt).length
  }));

  const totalResponses = session ? (session.studentResponses||[]).filter((r,i,a)=>a.findIndex(x=>x.studentId===r.studentId)===i).length : 0;

  // ── UPLOAD STAGE ──
  if (stage==='UPLOAD') return (
    <div className="max-w-3xl mx-auto p-4">
      <div className="flex items-center justify-between mb-6">

          <svg className="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 19l-7-7 7-7"/></svg>Back
        </button>
        <h2 className="text-2xl font-bold text-[#002046] font-serif">📡 Live Session</h2>
        <div/>

      <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 mb-4">
        <h3 className="font-bold text-slate-800 mb-1">Load Your Lesson Content</h3>
        <p className="text-sm text-slate-500 mb-4">Upload your PPT, paste your notes, or pick a demo file. AI will generate quiz questions — you show the slides on the projector as normal.</p>

        {/* Drag & Drop Zone */}
        <div
          onDragOver={e=>{e.preventDefault();setDragOver(true);}}

          onDrop={handleDrop}
          onClick={()=>fileRef.current?.click()}
          className={`relative border-2 border-dashed rounded-2xl p-8 text-center cursor-pointer transition-all mb-4 ${dragOver?'border-[#002046] bg-blue-50':'border-slate-300 hover:border-[#002046] hover:bg-slate-50'}`}
        >
          <input ref={fileRef} type="file" accept=".pptx,.ppt,.pdf,.txt,.docx" onChange={handleFileInput} className="hidden"/>
          {extracting ? (
            <div className="flex flex-col items-center">
              <div className="animate-spin rounded-full h-10 w-10 border-t-4 border-b-4 border-[#002046] mb-3"></div>
              <p className="font-bold text-[#002046]">Extracting content from {fileName}...</p>
            </div>
          ) : fileName && content ? (
            <div className="flex flex-col items-center">
              <span className="text-4xl mb-2">✅</span>
              <p className="font-bold text-emerald-700">{fileName} loaded!</p>
              <p className="text-xs text-slate-400 mt-1">Click to replace with a different file</p>
            </div>
          ) : (
            <div className="flex flex-col items-center">
              <span className="text-5xl mb-3">📂</span>
              <p className="font-bold text-slate-700 mb-1">Drag & drop your file here</p>
              <p className="text-sm text-slate-500 mb-3">Supports .pptx, .pdf, .txt files</p>
              <span className="bg-[#002046] text-white text-xs font-bold px-4 py-2 rounded-xl">Browse Files</span>
            </div>
          )}
        </div>

        {/* OR demo files */}
        <div className="flex items-center gap-3 mb-4">
          <div className="flex-1 h-px bg-slate-200"></div>
          <span className="text-xs text-slate-400 font-bold">OR USE A DEMO FILE</span>
          <div className="flex-1 h-px bg-slate-200"></div>
        </div>
        <div className="grid grid-cols-2 gap-2 mb-4">
          {MOCK_DRIVE_FILES.map(f=>(
            <button key={f.id} onClick={()=>{setContent(f.content);setFileName(f.name);}} className={`text-left p-3 rounded-xl border transition-colors ${content===f.content?'border-[#002046] bg-blue-50':'border-slate-200 hover:border-slate-300 hover:bg-slate-50'}`}>
              <div className="flex items-center gap-2">
                <span className="text-lg">{f.type==='presentation'?'📊':f.type==='document'?'📄':'📑'}</span>

              </div>
            </button>
          ))}
        </div>

        {/* Text area — shows extracted or manually typed content */}
        <div className="mb-4">
          <label className="block text-xs font-bold text-slate-500 mb-2 uppercase tracking-wider">Lesson Content {fileName&&`(from ${fileName})`}</label>
          <textarea value={content} onChange={e=>setContent(e.target.value)} className="w-full p-4 border-2 border-slate-200 rounded-xl focus:outline-none focus:border-[#002046] min-h-36 text-sm font-mono resize-none" placeholder="Lesson content will appear here after upload, or type/paste directly..."/>
        </div>

        <button onClick={generate} disabled={!content.trim()||loading} className="w-full bg-[#002046] text-[#C5A059] font-bold py-3.5 rounded-xl hover:bg-[#002d5c] disabled:opacity-40 transition-colors text-sm">
          {loading ? (
            <span className="flex items-center justify-center gap-2">
              <span className="animate-spin rounded-full h-4 w-4 border-t-2 border-b-2 border-[#C5A059]"></span>
              AI is generating 5 quiz questions...
            </span>
          ) : '🚀 Generate Quiz Questions →'}
        </button>
          <p className="text-xs text-slate-400 text-center mt-3">💡 Tip: Start your presentation on the projector first, then generate questions. Students wait on their devices until you launch the quiz.</p>
    </div>
    </div>
  );

  // ── POLL STAGE ──
  if (stage==='POLL') return (
    <div className="max-w-4xl mx-auto p-4">
      {/* Top bar */}
      <div className="flex items-center justify-between mb-4 bg-white rounded-2xl border border-slate-100 shadow-sm p-4">
        <div className="flex items-center gap-3">
          <div className="flex items-center"><span className="w-3 h-3 bg-red-500 rounded-full animate-pulse mr-2"></span><span className="text-xs font-bold text-red-600 uppercase">Live Session Active</span></div>
          <span className="text-xs text-slate-400 bg-slate-100 px-2 py-1 rounded-full font-bold">👥 {totalResponses} students responded</span>
        </div>
        <button onClick={analyze} disabled={loading} className="bg-[#C5A059] text-[#002046] font-bold px-5 py-2 rounded-xl text-sm hover:bg-[#b08d4b] disabled:opacity-50">
          {loading?'Analysing...':'End & Analyse Results'}

      </div>

      {/* Stage controls */}
      <div className="grid grid-cols-3 gap-2 mb-4">
        {[{label:'📖 Show Content',s:'CONTENT_VIEW',desc:'Students read lesson'},{label:'▶ Start Quiz',s:'QUIZ',desc:'Students answer questions'},{label:'⏸ Pause',s:'WAITING',desc:'Pause everything'}].map(({label,s,desc})=>(

                </div>
                <div className="w-full bg-slate-200 rounded-full h-2">
                  <div className={`h-2 rounded-full ${pct>=70?'bg-emerald-500':pct>=40?'bg-amber-500':'bg-red-400'}`} style={{width:`${pct}%`}}></div>
                </div>
                <p className="text-[10px] text-slate-400 mt-1">{correct}/{total} students · Answer: <strong>{q.correctAnswer}</strong></p>
              </div>
            );
          })}
        </div>
      </div>

      {/* Action items */}
      <div className="bg-white rounded-2xl border border-slate-200 p-5 mb-5">
        <h3 className="font-bold text-[#002046] mb-3">🎯 Recommended Next Steps</h3>
        <div className="space-y-3">
          {(analysis.actionItems||[]).map((item,i)=>(
            <div key={i} className="flex items-start">

              <p className="text-sm leading-relaxed">{item}</p>
            </div>
          ))}
        </div>
      </div>

      <div className="flex gap-3">
        <button onClick={()=>setStage('POLL')} className="flex-1 py-3 rounded-xl border-2 border-slate-300 text-slate-600 font-bold hover:bg-slate-50 text-sm">← Back to Session</button>

      </div>
    </div>
  );

  return <div className="text-center p-8"><button onClick={onExit} className="text-blue-500 underline">Return to Dashboard</button></div>;
}

      {/* Stats */}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
        {[{label:'Students',value:students.length,icon:'👩‍🎓',color:'blue'},{label:'Active Today',value:students.filter(s=>s.lastSeen&&new Date(s.lastSeen)>new Date(Date.now()-86400000)).length,icon:'🟢',color:'green'},{label:'Help Requests',value:students.reduce((a,s)=>a+(Number(s.helpUsageCount)||0),0),icon:'🆘',color:'orange'},{label:'Avg XP',value:students.length?Math.round(students.reduce((a,s)=>a+(Number(s.xp)||0),0)/students.length):0,icon:'⭐',color:'purple'}].map(({label,value,icon,color})=>(
          <div key={label} className="bg-white rounded-2xl p-5 border border-slate-100 shadow-sm"><p className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">{icon} {label}</p><p className="text-3xl font-bold text-[#002046]">{value}</p></div>
        ))}
      </div>

      <div className="grid grid-cols-1 xl:grid-cols-3 gap-6">
        {/* Student List */}
        <div className="xl:col-span-2 bg-white rounded-2xl border border-slate-100 shadow-sm p-5">
          <h3 className="font-bold text-[#002046] mb-4">Students {loading&&<span className="text-xs text-slate-400 font-normal ml-2 animate-pulse">Loading...</span>}</h3>
          {students.length===0&&!loading&&<div className="text-center py-10"><p className="text-slate-400 text-sm mb-2">No students have signed in yet.</p><p className="text-slate-400 text-xs">Share this link with your class: <span className="text-blue-500 font-mono">https://aharrison-cloud.github.io/curiosity-drive/</span></p></div>}
          <div className="space-y-2">
            {students.map(s=>{
              const avg=Object.values(s.mastery||{}).flatMap(m=>Object.values(m));
              const avgScore=avg.length?Math.round(avg.reduce((a,b)=>a+Number(b),0)/avg.length):0;
              return (
                <div key={s.email} onClick={()=>openStudent(s)} className="flex items-center justify-between p-3 bg-slate-50 rounded-xl border border-slate-200 hover:border-[#002046] cursor-pointer transition-all">
                  <div className="flex items-center gap-3">
                    <div className="w-9 h-9 rounded-full overflow-hidden border border-slate-200 flex-shrink-0 bg-slate-100">{s.picture?<img src={s.picture} className="w-full h-full object-cover" alt=""/>:<AvatarSVG config={s.avatarConfig}/>}</div>
                    <div><p className="font-bold text-slate-800 text-sm">{s.name}</p><p className="text-xs text-slate-400">{s.email}</p></div>
                  </div>
                  <div className="flex items-center gap-3">
                    <div className="hidden md:block w-20"><div className="w-full bg-slate-100 rounded-full h-1.5"><div className="bg-indigo-500 h-1.5 rounded-full" style={{width:`${avgScore}%`}}></div></div><p className="text-[10px] text-slate-400 text-right">{avgScore}%</p></div>
                    <span className={`text-xs font-bold px-2 py-0.5 rounded ${GRADE_COLOR[s.currentGrade]||'bg-slate-100 text-slate-600'}`}>{(s.currentGrade||'').split('(')[0].trim()}</span>
                    <svg className="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5l7 7-7 7"/></svg>
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {/* Grade Distribution */}
        <div className="bg-white rounded-2xl border border-slate-100 shadow-sm p-5">
          <h3 className="font-bold text-[#002046] mb-4">Grade Distribution</h3>
          <SimpleBarChart data={gradeData} labelKey="name" valueKey="count"/>
        </div>
      </div>

      {/* Student Detail Drawer */}
      {selected&&(
        <div className="fixed inset-0 bg-black/60 z-50 flex justify-end backdrop-blur-sm">
          <div className="w-full max-w-2xl bg-white h-full shadow-2xl overflow-y-auto">
            <div className="p-6">
              <button onClick={()=>setSelected(null)} className="mb-5 text-slate-500 hover:text-[#002046] flex items-center font-bold text-sm"><svg className="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"/></svg>Close</button>
              <div className="flex items-center gap-4 mb-6 pb-5 border-b border-slate-100">
                <div className="w-16 h-16 rounded-full overflow-hidden border-4 border-[#C5A059] flex-shrink-0">{selected.picture?<img src={selected.picture} className="w-full h-full object-cover" alt=""/>:<AvatarSVG config={selected.avatarConfig}/>}</div>
                <div><h2 className="text-xl font-bold text-[#002046] font-serif">{selected.name}</h2><p className="text-slate-400 text-sm">{selected.email}</p><div className="flex gap-2 mt-1"><span className={`text-xs font-bold px-2 py-0.5 rounded ${GRADE_COLOR[selected.currentGrade]||''}`}>{selected.currentGrade}</span><span className="text-xs text-slate-400">Level {selected.level} · {selected.xp} XP</span></div></div>
              </div>

              {/* Mastery Bars */}
              <div className="mb-6">
                <h3 className="font-bold text-[#002046] mb-3 text-sm">Topic Mastery</h3>
                <div className="space-y-3">
                  {Object.entries(selected.mastery||{}).map(([tId,modes])=>{
                    const t=TOPICS.find(x=>x.id===tId);
                    const avg=Math.round(Object.values(modes).reduce((a,b)=>a+Number(b),0)/Object.values(modes).length);
                    return (
                      <div key={tId}>
                        <div className="flex justify-between mb-1"><span className="text-xs font-bold text-slate-700">{t?.icon} {t?.name||tId}</span><span className={`text-xs font-bold ${avg>=80?'text-emerald-600':avg>=60?'text-yellow-600':'text-red-600'}`}>{avg}%</span></div>
                        <div className="w-full bg-slate-100 rounded-full h-2"><div className={`h-2 rounded-full ${avg>=80?'bg-emerald-500':avg>=60?'bg-yellow-500':'bg-red-400'}`} style={{width:`${avg}%`}}></div></div>
                      </div>
                    );
                  })}
                  {Object.keys(selected.mastery||{}).length===0&&<p className="text-xs text-slate-400">No quiz attempts yet.</p>}
                </div>
              </div>

              {/* AI Insight */}
              {loadingI?<div className="flex items-center justify-center py-8"><div className="animate-spin rounded-full h-8 w-8 border-t-4 border-b-4 border-[#002046]"></div><span className="ml-3 text-slate-500 text-sm">Generating AI insights...</span></div>
              :insight?(
                <div>
                  <div className="bg-blue-50 rounded-xl p-4 border border-blue-100 mb-4"><p className="text-sm text-blue-800 leading-relaxed">{insight.summary}</p></div>
                  <div className="grid grid-cols-2 gap-3 mb-4">
                    <div className="bg-green-50 rounded-xl p-3 border border-green-100"><h4 className="font-bold text-green-800 text-xs mb-2">✅ Strengths</h4><ul className="space-y-1">{(insight.strengths||[]).map((s,i)=><li key={i} className="text-xs text-green-700">• {s}</li>)}</ul></div>
                    <div className="bg-red-50 rounded-xl p-3 border border-red-100"><h4 className="font-bold text-red-800 text-xs mb-2">⚠️ Needs Work</h4><ul className="space-y-1">{(insight.weaknesses||[]).map((w,i)=><li key={i} className="text-xs text-red-700">• {w}</li>)}</ul></div>
                  </div>
                  <div className="bg-white rounded-xl border border-slate-200 p-4">
                    <h4 className="font-bold text-[#002046] text-sm mb-3">🎯 Action Steps</h4>
                    <div className="space-y-3">{(insight.actionableSteps||[]).map((s,i)=>(
                      <div key={i} className="flex items-start"><span className="w-5 h-5 bg-[#002046] text-white rounded-full flex items-center justify-center text-[10px] font-bold mr-2 flex-shrink-0">{i+1}</span>
                      <div><p className="text-xs font-bold text-slate-700">{s.step}</p><a href={`https://www.google.com/search?q=${encodeURIComponent(s.resourceSearchTerm||'')}`} target="_blank" rel="noopener noreferrer" className="text-[10px] text-blue-600 hover:underline">{s.resourceTitle}</a></div>
                      </div>
                    ))}</div>
                  </div>
                </div>
              ):<div className="text-center py-6 text-slate-400 text-sm">Could not load AI insights.</div>}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// FEEDBACK BUTTON
// ═══════════════════════════════════════
function FeedbackButton({student}) {
  const [open,setOpen]=useState(false);
  const [type,setType]=useState('bug');
  const [msg,setMsg]=useState('');
  const [page,setPage]=useState('');
  const [sent,setSent]=useState(false);
  const [sending,setSending]=useState(false);

  const types=[{v:'bug',l:'🐛 Bug Report',d:'Something is broken or not working'},{v:'feature',l:'💡 Feature Idea',d:'Something you would like to see added'},{v:'content',l:'📚 Content Issue',d:'Wrong information or missing topic'},{v:'other',l:'💬 General Feedback',d:'Anything else'}];

  const submit=async()=>{
    if(!msg.trim())return;
    setSending(true);
    try {
      await api.submitFeedback({
        email:student?.email||'unknown',
        name:student?.name||'unknown',
        role:student?.role||'STUDENT',
        type, message:msg, page,
        userAgent:navigator.userAgent,
        timestamp:new Date().toISOString()
      });
      setSent(true);
    } catch(e) { alert('Could not submit. Please try again.'); }
    setSending(false);
  };

  const reset=()=>{setOpen(false);setType('bug');setMsg('');setPage('');setSent(false);};

  return (
    <>
      {/* Floating Button */}
      <button onClick={()=>setOpen(true)} className="fixed bottom-6 right-6 z-50 bg-[#C5A059] text-[#002046] font-bold px-4 py-3 rounded-2xl shadow-xl hover:bg-[#b08d4b] hover:shadow-2xl transition-all flex items-center gap-2 text-sm border-2 border-[#002046]">
        <span>💬</span><span className="hidden sm:inline">Feedback</span>
      </button>

      {/* Modal */}
      {open&&(
        <div className="fixed inset-0 bg-black/60 flex items-end sm:items-center justify-center z-50 p-4 backdrop-blur-sm">
          <div className="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden">
            {/* Header */}
            <div className="bg-[#002046] p-5 flex items-center justify-between">
              <div><h3 className="font-bold text-white font-serif text-lg">Send Feedback</h3><p className="text-blue-300 text-xs">Help us improve Curiosity Drive</p></div>
              <button onClick={reset} className="text-white/60 hover:text-white"><svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
            </div>

            {sent ? (
              <div className="p-8 text-center">
                <span className="text-5xl block mb-4">🚀</span>
                <h3 className="text-xl font-bold text-[#002046] mb-2 font-serif">Thank you!</h3>
                <p className="text-slate-500 text-sm mb-5">Your feedback has been sent to the development team. We'll review it and work on improvements.</p>
                <button onClick={reset} className="bg-[#002046] text-[#C5A059] font-bold px-8 py-3 rounded-xl hover:bg-[#002d5c]">Done</button>
              </div>
            ) : (
              <div className="p-5">
                {/* Type selector */}
                <div className="mb-4">
                  <label className="block text-xs font-bold text-slate-500 mb-2 uppercase tracking-wider">What kind of feedback?</label>
                  <div className="grid grid-cols-2 gap-2">
                    {types.map(t=>(
                      <button key={t.v} onClick={()=>setType(t.v)} className={`p-3 rounded-xl border-2 text-left transition-all ${type===t.v?'border-[#002046] bg-blue-50':'border-slate-200 hover:border-slate-300'}`}>
                        <p className="font-bold text-sm text-slate-800">{t.l}</p>
                        <p className="text-xs text-slate-400 mt-0.5">{t.d}</p>
                      </button>
                    ))}
                  </div>
                </div>

                {/* Page field */}
                <div className="mb-4">
                  <label className="block text-xs font-bold text-slate-500 mb-2 uppercase tracking-wider">Where did this happen?</label>
                  <input value={page} onChange={e=>setPage(e.target.value)} placeholder="e.g. Quiz, Textbook, Teacher Dashboard..." className="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-[#002046]"/>
                </div>

                {/* Message */}
                <div className="mb-5">
                  <label className="block text-xs font-bold text-slate-500 mb-2 uppercase tracking-wider">
                    {type==='bug'?'Describe what went wrong:':type==='feature'?'Describe your idea:':type==='content'?'What was wrong or missing?':'Your feedback:'}
                  </label>
                  <textarea value={msg} onChange={e=>setMsg(e.target.value)} rows={4} placeholder={type==='bug'?'e.g. When I click Submit on the quiz, nothing happens...':type==='feature'?'e.g. It would be great if students could...':'Tell us more...'} className="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-[#002046] resize-none"/>
                </div>

                <div className="flex gap-3">
                  <button onClick={reset} className="flex-1 py-2.5 rounded-xl border border-slate-200 text-slate-600 font-bold hover:bg-slate-50 text-sm">Cancel</button>
                  <button onClick={submit} disabled={!msg.trim()||sending} className="flex-1 py-2.5 rounded-xl bg-[#002046] text-[#C5A059] font-bold hover:bg-[#002d5c] disabled:opacity-40 text-sm">{sending?'Sending...':'Send Feedback →'}</button>
                </div>
                <p className="text-xs text-slate-400 text-center mt-3">Sent from: {student?.name} ({student?.email})</p>
              </div>
            )}
          </div>
        </div>
      )}
    </>
  );
}

// MAIN APP
// ═══════════════════════════════════════
function App() {
  const [googleUser,setGU]=useState(null);
  const [student,setStudent]=useState(null);
  const [activityLog,setLog]=useState([]);
  const [view,setView]=useState('DASHBOARD');
  const [topic,setTopic]=useState(null);
  const [mode,setMode]=useState('CONTENT');
  const [showAvatar,setShowAvatar]=useState(false);
  const [saving,setSaving]=useState(false);
  const [viewingAs,setViewingAs]=useState(null); // for teacher to preview student view

  const isTeacher = student&&(student.role==='TEACHER'||TEACHER_EMAILS.includes(student.email));
  const activeRole = viewingAs||( isTeacher?'TEACHER':'STUDENT');

  const signIn=async(gu)=>{
    setGU(gu);
    let s=null;
    try{const r=await api.getStudent(gu.email);s=r?.student||null;}catch{}
    if(!s){s=newStudent(gu);try{await api.upsertStudent({...s,lastSeen:new Date().toISOString()});}catch{}}
    else{s.lastSeen=new Date().toISOString();try{await api.upsertStudent(s);}catch{}}
    setStudent(s);
    try{const lr=await api.getActivityLog(gu.email);if(lr?.log)setLog(lr.log);}catch{}
  };

  const save=async(updated)=>{setSaving(true);setStudent(updated);try{await api.upsertStudent({...updated,lastSeen:new Date().toISOString()});}catch{}setSaving(false);};

  const quizComplete=async(score,qCount,correctCount)=>{
    if(!topic||!student){setView('DASHBOARD');return;}
    const m={...student.mastery};
    if(!m[topic.id])m[topic.id]={CONTENT:0,COMMUNICATION:0,SCIENTIFIC:0,DATA_ANALYSIS:0};
    if(score>(m[topic.id][mode]||0))m[topic.id][mode]=score;
    const newXP=student.xp+(score>80?50:score>50?20:5);
    const newLevel=Math.floor(newXP/500)+1;
    const badges=[...(student.badges||[])];
    if(score===100&&!badges.includes('Perfect Score'))badges.push('Perfect Score');
    if(Object.keys(m).length>=5&&!badges.includes('Explorer'))badges.push('Explorer');
    await save({...student,mastery:m,xp:newXP,level:newLevel,badges});
    setView('DASHBOARD');
  };

  const saveAvatar=async(cfg)=>{await save({...student,avatarConfig:cfg});setShowAvatar(false);};

  const signOut=()=>{setGU(null);setStudent(null);setLog([]);setView('DASHBOARD');setViewingAs(null);};

  if (!googleUser||!student) return <SignIn onSignIn={signIn}/>;

  const renderView=()=>{
    // Teacher views
    if (activeRole==='TEACHER') {
      if(view==='LIVE_SESSION')return<LiveSessionManager teacher={student} onExit={()=>setView('DASHBOARD')}/>;
      return<TeacherDashboard teacher={student} onLaunchLive={()=>setView('LIVE_SESSION')}/>;
    }
    // Student views
    switch(view){
      case 'DASHBOARD':return<StudentDashboard student={student} activityLog={activityLog} onQuiz={()=>setView('TOPIC_SELECT')} onTextbook={()=>setView('TEXTBOOK')} onLive={()=>setView('STUDENT_LIVE')} onAvatar={()=>setShowAvatar(true)}/>;
      case 'TOPIC_SELECT':return<TopicSelector student={student} onSelect={(t,m)=>{setTopic(t);setMode(m);setView('QUIZ');}}/>;
      case 'QUIZ':return topic?<QuizModule student={student} topic={topic} mode={mode} onExit={()=>setView('TOPIC_SELECT')} onComplete={quizComplete}/>:<div className="text-center p-8">No topic. <button onClick={()=>setView('TOPIC_SELECT')} className="text-blue-500 underline">Pick one</button></div>;
      case 'TEXTBOOK':return<Textbook student={student} onExit={()=>setView('DASHBOARD')}/>;
      case 'STUDENT_LIVE':return<StudentLive student={student} onExit={()=>setView('DASHBOARD')}/>;
      default:return<StudentDashboard student={student} activityLog={activityLog} onQuiz={()=>setView('TOPIC_SELECT')} onTextbook={()=>setView('TEXTBOOK')} onLive={()=>setView('STUDENT_LIVE')} onAvatar={()=>setShowAvatar(true)}/>;
    }
  };

  return (
    <div className="min-h-screen bg-slate-50 flex flex-col font-sans">
      {/* Navbar */}
      <nav className="bg-white border-b border-slate-200 sticky top-0 z-40 shadow-sm">
        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
          <div className="flex justify-between h-14">
            <div className="flex items-center cursor-pointer gap-3" onClick={()=>setView('DASHBOARD')}>
              <svg className="h-9 w-auto" viewBox="0 0 100 100" fill="none">
                <ellipse cx="50" cy="55" rx="42" ry="12" stroke="#C5A059" strokeWidth="3" transform="rotate(-30 50 55)" strokeOpacity="0.6"/>
                <circle cx="18" cy="40" r="3" fill="#C5A059"/>
                <path d="M45,80 Q50,95 55,80" fill="#ef4444"/><path d="M48,80 Q50,90 52,80" fill="#fbbf24"/>
                <path d="M50,15 Q70,50 65,80 L35,80 Q30,50 50,15 Z" fill="#002046"/>
                <path d="M35,75 L20,90 L38,82 Z" fill="#002046"/><path d="M65,75 L80,90 L62,82 Z" fill="#002046"/>
                <circle cx="50" cy="45" r="10" fill="#4B9CD3" stroke="#fff" strokeWidth="2"/>
                <circle cx="53" cy="42" r="3" fill="white" opacity="0.6"/>
              </svg>
              <div className="hidden sm:block">
                <p className="text-[9px] text-[#C5A059] font-bold uppercase tracking-widest leading-none">NLCS Jeju</p>
                <p className="text-base font-bold font-serif text-[#002046] leading-none">Curiosity Drive</p>
              </div>
            </div>
            <div className="flex items-center gap-3">
              {saving&&<span className="text-xs text-slate-400 animate-pulse">Saving...</span>}
              {/* Role switcher — for teachers */}
              {isTeacher&&(
                <div className="flex bg-slate-100 rounded-lg p-1">
                  <button onClick={()=>{setViewingAs('TEACHER');setView('DASHBOARD');}} className={`px-3 py-1 rounded-md text-xs font-bold transition-all ${activeRole==='TEACHER'?'bg-white text-[#002046] shadow-sm':'text-slate-500 hover:text-slate-700'}`}>Teacher</button>
                  <button onClick={()=>{setViewingAs('STUDENT');setView('DASHBOARD');}} className={`px-3 py-1 rounded-md text-xs font-bold transition-all ${activeRole==='STUDENT'?'bg-white text-[#002046] shadow-sm':'text-slate-500 hover:text-slate-700'}`}>Student</button>
                </div>
              )}
              <div className="flex items-center gap-2 cursor-pointer" onClick={()=>!isTeacher&&setShowAvatar(true)}>
                <div className="w-8 h-8 rounded-full overflow-hidden border-2 border-[#C5A059] bg-slate-100 flex-shrink-0">
                  {student.picture?<img src={student.picture} className="w-full h-full object-cover" alt=""/>:<AvatarSVG config={student.avatarConfig}/>}
                </div>
                <div className="hidden sm:block">
                  <p className="text-xs font-bold text-slate-700 leading-none">{student.name.split(' ')[0]}</p>
                  <p className="text-[10px] text-slate-400 leading-none">{isTeacher?'Teacher':'Level '+student.level+' · '+student.xp+' XP'}</p>
                </div>
              </div>
              <button onClick={signOut} className="text-xs text-slate-400 hover:text-red-500 px-2 py-1 rounded hover:bg-red-50 transition-colors">Sign out</button>
            </div>
          </div>
        </div>
      </nav>

      <main className="flex-grow">{renderView()}</main>

      <footer className="bg-[#002046] text-white border-t-4 border-[#C5A059]">
        <div className="max-w-7xl mx-auto py-5 px-4 flex flex-col md:flex-row justify-between items-center">
          <div className="mb-2 md:mb-0"><h4 className="font-serif font-bold text-[#C5A059]">NLCS Jeju Junior School</h4><p className="text-xs text-blue-300">Start here. Go anywhere.</p></div>
          <p className="text-xs text-blue-400">© 2024 Curiosity Drive · UK National Curriculum</p>
        </div>
      </footer>

      {showAvatar&&<AvatarCreator initial={student.avatarConfig} onSave={saveAvatar} onCancel={()=>setShowAvatar(false)}/>}
      <FeedbackButton student={student}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>

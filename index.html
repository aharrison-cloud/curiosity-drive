<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NLCS Jeju | Curiosity Drive v5.0</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { font-family: 'Nunito', sans-serif; background: #f4f7f9; color: #002046; margin: 0; }
    .sidebar { width: 280px; height: 100vh; position: fixed; background: #002046; color: white; z-index: 100; border-right: 4px solid #78beeb; overflow-y: auto; }
    .main-content { margin-left: 280px; padding: 40px; min-height: 100vh; }
    .card { border-radius: 2rem; background: white; border: 1px solid #e2e8f0; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    .pillar-box { border-left: 6px solid #78beeb; padding: 1.5rem; background: #f0f9ff; border-radius: 1.5rem; margin-bottom: 1rem; }
    .accelerator-card { background: linear-gradient(135deg, #002046 0%, #1e3a8a 100%); color: white; border: none; }
    .btn-nav { width: 100%; text-align: left; padding: 0.75rem 1.5rem; border-radius: 1rem; font-weight: 700; font-size: 0.875rem; transition: all 0.2s; margin-bottom: 0.25rem; }
    .btn-active { background: #78beeb !important; color: #002046 !important; }
    .logo-box { position: relative; width: 50px; height: 50px; margin: 0 auto; }
    .nucleus { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; background: #78beeb; border-radius: 50%; transform: translate(-50%, -50%); }
    .orbit { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 1px solid rgba(120,190,235,0.4); border-radius: 50%; animation: spin 4s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState } = React;

const CONFIG = {
  API_KEY: 'AIzaSyDY-LfdOB4xKaCw7bGcdc6L7qDcjI_usAY',
  CLASSES: {
    'Year 5': ['5A', '5B', '5C', '5D', '5E'],
    'Year 6': ['6A', '6B', '6C', '6D', '6E']
  },
  CURRICULUM: {
    'Year 5': ['Properties of Materials', 'Forces', 'Earth and Space', 'Living Things & Habitats', 'Animals Including Humans'],
    'Year 6': ['Electricity', 'Light', 'Living Things & Classification', 'Evolution and Inheritance', 'The Circulatory System']
  }
};

function App() {
  const [appMode, setAppMode] = useState('TEACHER');
  const [selectedClass, setSelectedClass] = useState('6A');
  const [selectedTopic, setSelectedTopic] = useState('Electricity');
  const [activeView, setActiveView] = useState('DASHBOARD');
  const [loading, setLoading] = useState(false);
  const [aiData, setAiData] = useState(null);
  const [journal, setJournal] = useState("");

  const currentYear = selectedClass.startsWith('5') ? 'Year 5' : 'Year 6';

  const callAI = async (prompt) => {
    setLoading(true);
    try {
      const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${CONFIG.API_KEY}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }],
          generationConfig: { responseMimeType: "application/json" }
        })
      });
      const data = await res.json();
      setAiData(JSON.parse(data.candidates[0].content.parts[0].text));
    } catch (e) {
      console.error(e);
    }
    setLoading(false);
  };

  // --- TEACHER HUB ---
  const TeacherHub = () => (
    <div className="flex">
      <aside className="sidebar p-6 flex flex-col">
        <div className="logo-box"><div className="nucleus"></div><div className="orbit"></div></div>
        <h2 className="text-center font-black text-[10px] tracking-widest mt-4 uppercase text-[#78beeb] mb-8">Curiosity Drive</h2>
        {Object.entries(CONFIG.CLASSES).map(([year, rooms]) => (
          <div key={year} className="mb-6">
            <p className="text-[10px] font-black uppercase opacity-40 mb-2 px-4">{year}</p>
            {rooms.map(c => (
              <button key={c} onClick={() => setSelectedClass(c)} className={`btn-nav ${selectedClass === c ? 'btn-active' : ''}`}>{c}</button>
            ))}
          </div>
        ))}
        <button onClick={() => setAppMode('STUDENT')} className="mt-auto w-full py-4 bg-[#78beeb] text-[#002046] rounded-2xl font-black text-xs uppercase shadow-xl hover:scale-105 transition-all">Student View 👁️</button>
      </aside>
      <main className="main-content flex-1">
        <header className="mb-10 flex justify-between items-end">
          <div><h1 className="text-4xl font-black">Class {selectedClass} Analytics</h1><p className="font-bold text-slate-400 italic">Curriculum Focus: {selectedTopic}</p></div>
          <select className="p-3 rounded-xl border-2 font-bold text-sm" onChange={(e) => setSelectedTopic(e.target.value)} value={selectedTopic}>
            {CONFIG.CURRICULUM[currentYear].map(t => <option key={t} value={t}>{t}</option>)}
          </select>
        </header>
        <div className="grid grid-cols-1 lg:grid-cols-4 gap-8">
          <div className="lg:col-span-1 space-y-3">
             {['Alex Wong', 'Sora Lee', 'Min-Jun Park'].map(name => (
               <div key={name} onClick={() => callAI(`Audit ${name} for ${selectedTopic}. Return JSON: {"summary": "3-sentence pedagogic report", "pillar1": "Content Mastery", "pillar2": "Scientific Vocab", "pillar3": "Methodology", "accelerator": "KS3 level extension mission"}`)} 
                 className="card !p-5 cursor-pointer hover:border-[#78beeb]"><p className="font-black">{name}</p><p className="text-[10px] font-bold text-slate-400 uppercase">View 3-Pillar Audit</p></div>
             ))}
          </div>
          <div className="lg:col-span-3">
             {loading ? <div className="card h-64 flex items-center justify-center animate-pulse font-black">AI AUDITING...</div> : aiData && (
               <div className="space-y-6 animate-in slide-in-from-right-5">
                 <div className="card bg-[#002046] text-white p-8"><p className="text-[#78beeb] font-bold italic border-l-4 border-[#78beeb] pl-6">"{aiData.summary}"</p></div>
                 <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div className="pillar-box"><strong>Content:</strong> {aiData.pillar1}</div>
                    <div className="pillar-box border-l-orange-400"><strong>Comm:</strong> {aiData.pillar2}</div>
                    <div className="pillar-box border-l-emerald-400"><strong>Method:</strong> {aiData.pillar3}</div>
                 </div>
                 <div className="card bg-[#78beeb] p-6 font-black text-[#002046]">🚀 ACCELERATOR: {aiData.accelerator}</div>
               </div>
             )}
          </div>
        </div>
      </main>
    </div>
  );

  // --- STUDENT HUB ---
  const StudentHub = () => (
    <div className="min-h-screen bg-[#f0f9ff] pb-20">
      <nav className="p-8 flex justify-between items-center max-w-7xl mx-auto">
        <button onClick={() => setAppMode('TEACHER')} className="px-6 py-2 bg-[#002046] text-white rounded-full font-black text-[10px] uppercase">← Back to Faculty</button>
        <div className="flex items-center gap-4"><div className="logo-box"><div className="nucleus"></div><div className="orbit"></div></div><h1 className="text-2xl font-black">Curiosity Drive</h1></div>
      </nav>
      <main className="max-w-6xl mx-auto px-6">
        {activeView === 'DASHBOARD' ? (
          <div>
            <header className="text-center mb-16 mt-10"><h1 className="text-7xl font-black mb-4">Science Mission</h1><p className="text-xl font-bold text-slate-400 tracking-widest uppercase">Unit: {selectedTopic}</p></header>
            <div className="grid grid-cols-1 md:grid-cols-3 gap-8 mb-12">
              <div onClick={() => setActiveView('LAB')} className="card !p-10 bg-[#002046] text-white cursor-pointer hover:scale-105 transition-all text-center">
                <span className="text-6xl mb-4 block">🧪</span><h3 className="text-2xl font-black">The Lab</h3>
              </div>
              <div onClick={() => { setActiveView('TEXTBOOK'); callAI(`Generate Year ${currentYear.slice(-1)} Science textbook for ${selectedTopic}. JSON: {"title": "", "sections": [{"h": "", "p": ""}]}`); }} className="card !p-10 cursor-pointer hover:scale-105 transition-all text-center">
                <span className="text-6xl mb-4 block">📖</span><h3 className="text-2xl font-black">Theory Hub</h3>
              </div>
              <div onClick={() => setActiveView('QUIZ')} className="card !p-10 cursor-pointer hover:scale-105 transition-all text-center">
                <span className="text-6xl mb-4 block">🎯</span><h3 className="text-2xl font-black">Mastery</h3>
              </div>
            </div>
            
            {/* NEW: Curiosity Accelerators Section */}
            <section className="mb-12">
               <h2 className="text-3xl font-black mb-6 border-b-4 border-[#78beeb] inline-block pb-2">Curiosity Accelerators</h2>
               <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                  <div className="card accelerator-card p-8 relative overflow-hidden">
                    <div className="relative z-10">
                      <h4 className="text-[#78beeb] font-black uppercase text-xs mb-2">Targeted Extension Mission</h4>
                      <p className="text-lg font-bold italic">"Based on your Lab performance, can you explain how changing the length of a wire affects the resistance in a circuit?"</p>
                      <button className="mt-4 px-6 py-2 bg-[#78beeb] text-[#002046] rounded-xl font-black text-xs uppercase">Accept Mission</button>
                    </div>
                    <span className="absolute -right-4 -bottom-4 text-9xl opacity-10">🚀</span>
                  </div>
                  <div className="card p-8 border-2 border-dashed border-[#78beeb]">
                    <h4 className="text-slate-400 font-black uppercase text-xs mb-2">Vocab Booster</h4>
                    <p className="text-lg font-bold italic">"You are 85% towards mastery. Start using the term 'Deoxygenated' instead of 'dark red' in your circulatory system write-ups."</p>
                  </div>
               </div>
            </section>

            <section>
              <h2 className="text-3xl font-black mb-6 border-b-4 border-slate-200 inline-block pb-2">Your 3-Pillar Pulse</h2>
              <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div className="pillar-box"><h4 className="text-[10px] font-black text-blue-500 uppercase">Content</h4><p className="text-xs font-bold text-slate-500 italic">"Mastering series circuits."</p></div>
                <div className="pillar-box border-l-orange-400"><h4 className="text-[10px] font-black text-orange-400 uppercase">Comm</h4><p className="text-xs font-bold text-slate-500 italic">"Using Tier 3 keywords."</p></div>
                <div className="pillar-box border-l-emerald-400"><h4 className="text-[10px] font-black text-emerald-400 uppercase">Method</h4><p className="text-xs font-bold text-slate-500 italic">"Precision in variables."</p></div>
              </div>
            </section>
          </div>
        ) : (
          <div className="mt-10 card !p-12 animate-in slide-in-from-bottom-5">
            <button onClick={() => setActiveView('DASHBOARD')} className="mb-8 font-black text-slate-400 uppercase text-xs">← Exit Mission</button>
            {activeView === 'LAB' && (
              <div className="space-y-8">
                 <iframe src={selectedTopic === 'Electricity' ? "https://phet.colorado.edu/sims/html/circuit-construction-kit-dc/latest/circuit-construction-kit-dc_en.html" : "https://phet.colorado.edu/sims/html/forces-and-motion-basics/latest/forces-and-motion-basics_en.html"} className="w-full h-[500px] rounded-3xl border-8 border-[#002046]"></iframe>
                 <div className="p-8 bg-slate-50 rounded-3xl">
                   <h3 className="text-2xl font-black mb-4">Scientific Journal</h3>
                   <textarea value={journal} onChange={(e) => setJournal(e.target.value)} placeholder="What did you observe today? Use data from the simulation." className="w-full h-32 p-5 rounded-2xl border-2 font-bold mb-4"></textarea>
                   <button onClick={() => callAI(`Analyze student conclusion for ${selectedTopic}: "${journal}". Return JSON: {"pillar2": "Communication feedback"}`)} className="w-full py-4 bg-[#002046] text-white rounded-2xl font-black uppercase text-xs">Analyze My Conclusion</button>
                   {aiData && aiData.pillar2 && <div className="mt-6 p-6 border-l-8 border-[#78beeb] bg-white rounded-2xl"><p className="font-bold text-slate-600 italic">💡 AI Mentor: {aiData.pillar2}</p></div>}
                 </div>
              </div>
            )}
            {activeView === 'TEXTBOOK' && aiData && (
              <div><h1 className="text-5xl font-black mb-10 italic">{aiData.title}</h1>{aiData.sections?.map(s => <div key={s.h} className="mb-8"><h2 className="text-2xl font-black mb-4">{s.h}</h2><p className="text-lg text-slate-600 leading-relaxed font-bold">{s.p}</p></div>)}</div>
            )}
          </div>
        )}
      </main>
    </div>
  );

  return appMode === 'TEACHER' ? <TeacherHub /> : <StudentHub />;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NLCS Jeju | Curiosity Drive</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://accounts.google.com/gsi/client"></script>
  <style>
    body { font-family: 'Nunito', sans-serif; background: #f8fafc; color: #002046; }
    .teacher-sidebar { background: #002046; color: white; width: 300px; height: 100vh; position: fixed; }
    .main-content { margin-left: 300px; padding: 40px; }
    .card { background: white; border-radius: 2rem; padding: 2rem; box-shadow: 0 4px 20px rgba(0,32,70,0.05); border: 1px solid #e2e8f0; }
    .status-pill { padding: 4px 12px; border-radius: 999px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
    
    /* Atom Rocket Logo */
    .atom-container { position: relative; width: 50px; height: 50px; margin: 0 auto; }
    .nucleus { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; background: #78beeb; border-radius: 50%; transform: translate(-50%, -50%); }
    .orbit { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 1px solid rgba(120, 190, 235, 0.3); border-radius: 50%; animation: rotate 3s linear infinite; }
    .orbit:nth-child(2) { transform: rotate(60deg); }
    .rocket-head { position: absolute; top: -8px; left: 50%; font-size: 16px; transform: translateX(-50%); }
    @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const CONFIG = {
  GEMINI_API_KEY: 'AIzaSyDY-LfdOB4xKaCw7bGcdc6L7qDcjI_usAY',
  TEACHER_DOMAIN: '@nlcsjeju.kr'
};

const MOCK_DATA = {
  "5A": [
    { id: 1, name: "Ji-hoon Lee", score: 85, lastTopic: "Forces", journals: 4 },
    { id: 2, name: "Sarah Park", score: 62, lastTopic: "Circulation", journals: 2 },
    { id: 3, name: "Alex Kim", score: 92, lastTopic: "Light", journals: 7 }
  ],
  "6B": [
    { id: 4, name: "Yuna Choi", score: 78, lastTopic: "Space", journals: 5 },
    { id: 5, name: "Leo Zhang", score: 45, lastTopic: "Light", journals: 1 }
  ]
};

function App() {
  const [user, setUser] = useState({ name: "Mr. Harrison", email: "aharrison@nlcsjeju.kr" });
  const [view, setView] = useState('TEACHER_HUB');
  const [selectedClass, setSelectedClass] = useState("5A");
  const [selectedStudent, setSelectedStudent] = useState(null);
  const [aiInsight, setAiInsight] = useState(null);
  const [loading, setLoading] = useState(false);

  const getAIInsight = async (student) => {
    setLoading(true);
    setSelectedStudent(student);
    try {
      const prompt = `Student: ${student.name}. Current Score: ${student.score}%. Recent Topic: ${student.lastTopic}. 
      Generate AI Teacher Feedback. JSON format: {"gaps": "", "nextSteps": "", "curiosityLevel": ""}`;
      
      const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${CONFIG.GEMINI_API_KEY}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { responseMimeType: 'application/json' } })
      });
      const data = await res.json();
      setAiInsight(JSON.parse(data.candidates[0].content.parts[0].text));
    } catch (e) { console.error(e); }
    setLoading(false);
  };

  const Logo = () => (
    <div className="atom-container">
      <div className="nucleus"></div>
      <div className="orbit"><span className="rocket-head">🚀</span></div>
      <div className="orbit"></div>
    </div>
  );

  return (
    <div className="flex">
      {/* SIDEBAR */}
      <aside className="teacher-sidebar p-8">
        <Logo />
        <h1 className="text-center font-black mt-4 text-sm tracking-widest uppercase">Curiosity Drive</h1>
        
        <div className="mt-12 space-y-2">
          <p className="text-[10px] font-black text-slate-500 uppercase px-4">Select Class</p>
          {Object.keys(MOCK_DATA).map(cls => (
            <button key={cls} 
              onClick={() => { setSelectedClass(cls); setSelectedStudent(null); setAiInsight(null); }}
              className={`w-full text-left px-6 py-3 rounded-2xl font-bold transition-all ${selectedClass === cls ? 'bg-[#78beeb] text-[#002046]' : 'hover:bg-white/5'}`}>
              Class {cls}
            </button>
          ))}
        </div>

        <div className="absolute bottom-8 left-8 right-8">
          <button onClick={() => alert("Switching to Student View...")} className="w-full py-4 bg-white/10 rounded-2xl font-black text-xs uppercase border border-white/20 hover:bg-white/20 transition-all">
            Student Preview 👁️
          </button>
        </div>
      </aside>

      {/* MAIN CONTENT */}
      <main className="main-content flex-1">
        <header className="flex justify-between items-center mb-12">
          <div>
            <h2 className="text-4xl font-black">Teacher Dashboard</h2>
            <p className="text-slate-400 font-bold">Inquiry Tracking: Class {selectedClass}</p>
          </div>
          <div className="bg-white px-6 py-3 rounded-full border flex items-center gap-4">
            <div className="w-8 h-8 bg-[#002046] rounded-full"></div>
            <span className="font-black text-sm">{user.name}</span>
          </div>
        </header>

        <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
          
          {/* STUDENT LIST */}
          <div className="lg:col-span-1 space-y-4">
            <h3 className="font-black text-lg px-2">Student Roster</h3>
            {MOCK_DATA[selectedClass].map(student => (
              <div key={student.id} 
                onClick={() => getAIInsight(student)}
                className={`card cursor-pointer hover:border-[#78beeb] transition-all !p-6 flex justify-between items-center ${selectedStudent?.id === student.id ? 'ring-2 ring-[#78beeb]' : ''}`}>
                <div>
                  <p className="font-black">{student.name}</p>
                  <p className="text-xs text-slate-400">XP: {student.journals * 250}</p>
                </div>
                <div className={`status-pill ${student.score > 80 ? 'bg-emerald-100 text-emerald-600' : 'bg-orange-100 text-orange-600'}`}>
                  {student.score}%
                </div>
              </div>
            ))}
          </div>

          {/* AI ANALYTICS PANEL */}
          <div className="lg:col-span-2">
            {!selectedStudent ? (
              <div className="card h-full flex flex-col items-center justify-center text-slate-300 border-dashed border-2">
                <div className="text-6xl mb-4">🔍</div>
                <p className="font-bold">Select a student to generate AI insights</p>
              </div>
            ) : (
              <div className="space-y-6 animate-in fade-in slide-in-from-right-4">
                <div className="card !bg-[#002046] text-white">
                  <div className="flex justify-between items-start">
                    <div>
                      <h3 className="text-3xl font-black">{selectedStudent.name}</h3>
                      <p className="text-[#78beeb] font-bold">Current Focus: {selectedStudent.lastTopic}</p>
                    </div>
                    <div className="text-right">
                       <p className="text-[10px] font-black uppercase opacity-60">Engagement</p>
                       <p className="text-2xl font-black">High 🔥</p>
                    </div>
                  </div>
                </div>

                {loading ? (
                  <div className="card flex justify-center py-20">
                    <div className="animate-spin rounded-full h-10 w-10 border-4 border-[#78beeb] border-t-transparent"></div>
                  </div>
                ) : aiInsight && (
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div className="card border-l-8 border-orange-400">
                      <h4 className="font-black text-orange-500 uppercase text-xs mb-4 tracking-widest">⚠️ Gaps in Knowledge</h4>
                      <p className="text-slate-600 leading-relaxed font-bold">{aiInsight.gaps}</p>
                    </div>
                    <div className="card border-l-8 border-emerald-400">
                      <h4 className="font-black text-emerald-500 uppercase text-xs mb-4 tracking-widest">🚀 Recommended Next Steps</h4>
                      <p className="text-slate-600 leading-relaxed font-bold">{aiInsight.nextSteps}</p>
                    </div>
                    <div className="card md:col-span-2 flex items-center justify-between">
                      <div>
                        <h4 className="font-black text-slate-400 uppercase text-xs mb-1">Curiosity Level</h4>
                        <p className="text-xl font-black">{aiInsight.curiosityLevel}</p>
                      </div>
                      <button className="bg-[#002046] text-white px-8 py-3 rounded-2xl font-black text-xs uppercase shadow-lg">Push Extension Mission</button>
                    </div>
                  </div>
                )}
              </div>
            )}
          </div>

        </div>
      </main>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>

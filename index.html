<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NLCS Jeju Junior School | Curiosity Drive</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://accounts.google.com/gsi/client"></script>
  <style>
    body { font-family: 'Nunito', sans-serif; background-color: #f0f7ff; color: #002046; }
    .nlcs-navy { background-color: #002046; }
    .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px); border: 1px solid rgba(120, 190, 235, 0.3); }
    .rocket-float { animation: float 3s ease-in-out infinite; display: inline-block; }
    @keyframes float { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-10px) rotate(5deg); } }
    .btn-teacher { background: linear-gradient(135deg, #002046 0%, #1e3a8a 100%); color: white; }
    .teacher-badge { background: #78beeb; color: #002046; font-weight: 900; padding: 2px 8px; borderRadius: 6px; fontSize: 10px; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const CONFIG = {
  LOGO_URL: 'https://i.ibb.co/LzNfXmY/NLCS-Logo.png', 
  GOOGLE_CLIENT_ID: '594310820254-vtdhfitril7tqh6csj9vn5uakpj3s7fm.apps.googleusercontent.com',
  APPS_SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbxdsoT55lqh1mHvi7EMWBBM02ARK76FVSQmzpK1k3wq5ke02UvSSD1SdEEdUtKRswaw7g/exec',
  TEACHER_DOMAIN: '@nlcsjeju.kr'
};

function App() {
  const [user, setUser] = useState(null);
  const [role, setRole] = useState('STUDENT');
  const [view, setView] = useState('SIGNIN');
  const [isStudentPreview, setIsStudentPreview] = useState(false);

  const onLogin = (res) => {
    const p = JSON.parse(atob(res.credential.split('.')[1]));
    setUser(p);
    
    // Check if the email ends with the school staff domain
    const isTeacher = p.email.toLowerCase().endsWith(CONFIG.TEACHER_DOMAIN);
    setRole(isTeacher ? 'TEACHER' : 'STUDENT');
    
    if (isTeacher) {
      setView('TEACHER_HUB');
    } else {
      setView('CLASS_SELECT');
    }
  };

  const Branding = ({ size = "w-12" }) => (
    <div className="flex items-center gap-3">
      <img src={CONFIG.LOGO_URL} alt="NLCS" className={`${size} rounded-full border-2 border-[#78beeb] bg-[#002046] p-1`} />
      <span className="rocket-float text-3xl">🚀</span>
    </div>
  );

  if (view === 'SIGNIN') return (
    <div className="min-h-screen flex items-center justify-center bg-[#002046]">
      <div className="glass p-12 rounded-[4rem] text-center shadow-2xl max-w-sm border-b-8 border-[#78beeb]">
        <div className="flex justify-center mb-6"><Branding size="w-20" /></div>
        <h1 className="text-3xl font-black text-[#002046]">Curiosity Drive</h1>
        <p className="text-slate-400 font-bold text-[10px] tracking-widest mb-10">JUNIOR SCHOOL SCIENCE</p>
        <div id="g-login" ref={r => { if(r && window.google) {
          window.google.accounts.id.initialize({ client_id: CONFIG.GOOGLE_CLIENT_ID, callback: onLogin });
          window.google.accounts.id.renderButton(r, {theme:'outline', size:'large', shape:'pill'});
        }}}></div>
      </div>
    </div>
  );

  // ═══════════════════════════════════════
  // TEACHER HUB VIEW
  // ═══════════════════════════════════════
  if (view === 'TEACHER_HUB' && !isStudentPreview) return (
    <div className="max-w-6xl mx-auto p-8 animate-in fade-in">
      <nav className="flex justify-between items-center mb-10 glass p-6 rounded-[2.5rem] shadow-xl border-b-4 border-[#78beeb]">
        <Branding />
        <div className="flex gap-4 items-center">
          <span className="teacher-badge uppercase">Staff Access</span>
          <button onClick={() => setIsStudentPreview(true)} className="px-6 py-3 bg-[#002046] text-white rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-[#78beeb] hover:text-[#002046] transition-all">
            👁️ Student View
          </button>
        </div>
      </nav>

      <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
        <div className="md:col-span-2 space-y-8">
          <div className="bg-white p-10 rounded-[3rem] shadow-sm border border-slate-100">
            <h2 className="text-3xl font-black text-[#002046] mb-2">Welcome, {user.given_name}</h2>
            <p className="text-slate-500 font-bold">Science Department Portal • Junior School</p>
          </div>
          <div className="grid grid-cols-2 gap-6">
            <div className="bg-white p-8 rounded-[2.5rem] border shadow-sm">
                <p className="text-slate-400 font-black text-[10px] uppercase">Active Sessions</p>
                <p className="text-4xl font-black text-[#002046]">8 Classes</p>
            </div>
            <div className="bg-white p-8 rounded-[2.5rem] border shadow-sm">
                <p className="text-slate-400 font-black text-[10px] uppercase">Scientific Journals</p>
                <p className="text-4xl font-black text-emerald-500">142 Total</p>
            </div>
          </div>
        </div>

        <div className="bg-[#002046] p-10 rounded-[3.5rem] text-white shadow-2xl border-b-8 border-[#78beeb]">
          <h3 className="text-2xl font-black mb-6">Staff Tools</h3>
          <ul className="space-y-4">
            <li className="p-4 bg-white/5 rounded-2xl border border-white/10 text-sm font-bold cursor-pointer hover:bg-white/10">Download Activity CSV</li>
            <li className="p-4 bg-white/5 rounded-2xl border border-white/10 text-sm font-bold cursor-pointer hover:bg-white/10">Edit Science Topics</li>
            <li className="p-4 bg-white/5 rounded-2xl border border-white/10 text-sm font-bold cursor-pointer hover:bg-white/10">Reset Leaderboards</li>
          </ul>
        </div>
      </div>
    </div>
  );

  // ═══════════════════════════════════════
  // STUDENT VIEW (PREVIEW MODE FOR TEACHERS)
  // ═══════════════════════════════════════
  return (
    <div className="max-w-6xl mx-auto p-8 animate-in slide-in-from-bottom-10">
      {role === 'TEACHER' && (
        <div className="mb-6 flex justify-center sticky top-0 z-[100]">
          <button onClick={() => setIsStudentPreview(false)} className="px-8 py-2 bg-emerald-500 text-white rounded-full font-black text-[10px] uppercase tracking-[0.3em] shadow-xl border-4 border-white hover:scale-105 transition-all">
            ← Exit Student View
          </button>
        </div>
      )}
      
      <nav className="flex justify-between items-center mb-10 glass p-5 rounded-[2.5rem] border-b-4 border-[#78beeb]">
        <Branding />
        <div className="text-right">
           <p className="text-[10px] font-black text-slate-400 uppercase">Student Experience</p>
           <p className="font-black text-[#002046]">{user.name}</p>
        </div>
      </nav>

      <div className="grid grid-cols-2 lg:grid-cols-4 gap-6">
        {['🧲 Forces', '💡 Light', '🫀 Circulation', '🪐 Space'].map(t => (
          <div key={t} className="bg-white p-10 rounded-[3rem] border-b-4 border-transparent hover:border-[#78beeb] shadow-md hover:shadow-2xl transition-all text-center">
            <div className="text-6xl mb-4">{t.split(' ')[0]}</div>
            <h3 className="text-xl font-black text-[#002046]">{t.split(' ')[1]}</h3>
          </div>
        ))}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Curiosity Drive – NLCS Jeju Science</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://accounts.google.com/gsi/client"></script>
  <style>
    body{font-family:'Nunito',sans-serif; background-color: #f8fafc;}
    .font-serif,h1,h2,h3{font-family:'Playfair Display',serif;}
    .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.5); }
    .leaderboard-row:first-child { background: linear-gradient(90deg, #fefce8 0%, #ffffff 100%); border-left: 4px solid #facc15; }
    .xp-bar { transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1); }
  </style>
</head>
<body class="text-slate-900 min-h-screen">
<div id="root"></div>

<script type="text/babel">
const {useState, useEffect, useMemo} = React;

const CONFIG = {
  GOOGLE_CLIENT_ID:'594310820254-vtdhfitril7tqh6csj9vn5uakpj3s7fm.apps.googleusercontent.com',
  APPS_SCRIPT_URL:'https://script.google.com/macros/s/AKfycbxdsoT55lqh1mHvi7EMWBBM02ARK76FVSQmzpK1k3wq5ke02UvSSD1SdEEdUtKRswaw7g/exec',
  GEMINI_API_KEY:'AIzaSyDY-LfdOB4xKaCw7bGcdc6L7qDcjI_usAY',
  TEACHER_EMAILS: ['aharrison@nlcsjeju.kr']
};

// Simulated Class Data for the Leaderboard
const INITIAL_LEADERBOARD = [
  { class: '5C', cp: 1450, growth: '+12%', icon: '🚀' },
  { class: '6A', cp: 1200, growth: '+5%', icon: '🔬' },
  { class: '5A', cp: 980, growth: '+20%', icon: '⚡' },
  { class: '6B', cp: 850, growth: '-2%', icon: '🧬' },
  { class: '5B', cp: 600, growth: '+1%', icon: '🌿' }
];

function App() {
  const [user, setUser] = useState(null);
  const [role, setRole] = useState('STUDENT');
  const [view, setView] = useState('SIGNIN'); // SIGNIN, DASHBOARD, LEADERBOARD
  const [studentClass, setStudentClass] = useState('5A');
  const [xp, setXp] = useState(420);

  const onGoogleLogin = (res) => {
    const p = JSON.parse(atob(res.credential.split('.')[1]));
    setUser(p);
    setRole(CONFIG.TEACHER_EMAILS.includes(p.email) ? 'TEACHER' : 'STUDENT');
    setView('DASHBOARD');
  };

  return (
    <div className="max-w-6xl mx-auto p-4 md:p-8">
      {/* Navbar */}
      <nav className="flex justify-between items-center mb-8 glass p-4 rounded-[2rem] sticky top-4 z-50 shadow-lg shadow-slate-200/50">
        <div className="flex items-center gap-3 font-black text-xl text-blue-700 cursor-pointer" onClick={() => setView('DASHBOARD')}>
          <div className="bg-blue-600 text-white w-10 h-10 flex items-center justify-center rounded-xl shadow-blue-200 shadow-lg">C</div>
          <span className="tracking-tight">Curiosity</span>
        </div>
        
        <div className="flex items-center gap-4">
          <button onClick={() => setView('LEADERBOARD')} className="flex items-center gap-2 px-4 py-2 rounded-full bg-yellow-400 text-yellow-900 font-black text-xs uppercase tracking-widest hover:scale-105 transition-all">
            🏆 Leaderboard
          </button>
          <div className="h-8 w-[1px] bg-slate-200 hidden sm:block"></div>
          <div className="flex items-center gap-3">
            <div className="text-right hidden xs:block">
              <p className="text-[10px] font-black text-slate-400 uppercase tracking-tighter">Class {studentClass}</p>
              <p className="text-xs font-bold text-slate-800">{user?.name || 'Explorer'}</p>
            </div>
            <img src={user?.picture || 'https://via.placeholder.com/40'} className="w-10 h-10 rounded-full border-2 border-white shadow-md" />
          </div>
        </div>
      </nav>

      {/* VIEW: DASHBOARD */}
      {view === 'DASHBOARD' && (
        <div className="space-y-10 animate-in fade-in duration-700">
           {/* AI Mission Alert */}
           <div className="bg-gradient-to-r from-indigo-600 to-blue-700 rounded-[3rem] p-10 text-white shadow-2xl relative overflow-hidden">
             <div className="relative z-10">
               <span className="bg-white/20 text-white text-[10px] font-black uppercase px-3 py-1 rounded-full backdrop-blur-md border border-white/20 mb-4 inline-block">Personal Mission</span>
               <h2 className="text-4xl font-black mb-2">Bridge the Gap: Light</h2>
               <p className="text-blue-100 max-w-md font-medium mb-8">You missed a few points on 'Refraction'. Complete this 5-minute lab to earn <span className="text-yellow-300 font-bold">50 Challenge Points</span> for Class {studentClass}!</p>
               <button className="bg-white text-blue-700 px-8 py-4 rounded-2xl font-black text-sm uppercase tracking-widest shadow-xl hover:bg-blue-50 transition-all">Accept AI Mission</button>
             </div>
             <div className="absolute right-[-20px] top-[-20px] text-[15rem] opacity-10 font-black select-none pointer-events-none">💡</div>
           </div>

           {/* Stats Summary */}
           <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
             {[
               { label: 'Total XP', val: xp, color: 'text-blue-600' },
               { label: 'Challenge Points', val: '145', color: 'text-purple-600' },
               { label: 'Rank', val: '#12', color: 'text-emerald-600' },
               { label: 'Badges', val: '🏅 🧪', color: 'text-orange-600' }
             ].map((s, i) => (
               <div key={i} className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm text-center">
                 <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">{s.label}</p>
                 <p className={`text-2xl font-black ${s.color}`}>{s.val}</p>
               </div>
             ))}
           </div>
        </div>
      )}

      {/* VIEW: LEADERBOARD */}
      {view === 'LEADERBOARD' && (
        <div className="max-w-3xl mx-auto space-y-8 animate-in slide-in-from-bottom-8 duration-500">
           <header className="text-center">
             <h2 className="text-4xl font-black text-slate-900 mb-2">House of Science</h2>
             <p className="text-slate-500 font-bold">Which class has the most scientific curiosity?</p>
           </header>

           <div className="bg-white rounded-[3rem] shadow-2xl border border-slate-100 overflow-hidden">
             <div className="p-8 bg-slate-900 text-white flex justify-between items-center">
               <span className="font-black uppercase text-xs tracking-[0.2em] text-slate-400">Class Ranking</span>
               <span className="font-black uppercase text-xs tracking-[0.2em] text-slate-400">Challenge Points</span>
             </div>
             
             <div className="divide-y divide-slate-50">
               {INITIAL_LEADERBOARD.map((item, i) => (
                 <div key={i} className="p-8 flex items-center justify-between leaderboard-row group hover:bg-slate-50 transition-all">
                   <div className="flex items-center gap-6">
                     <span className={`text-2xl font-black w-8 ${i === 0 ? 'text-yellow-500' : 'text-slate-300'}`}>
                       {i === 0 ? '🥇' : i + 1}
                     </span>
                     <div className="text-3xl grayscale group-hover:grayscale-0 transition-all">{item.icon}</div>
                     <div>
                       <h3 className="text-2xl font-black text-slate-800">Class {item.class}</h3>
                       <p className={`text-xs font-bold ${item.growth.startsWith('+') ? 'text-emerald-500' : 'text-red-400'}`}>
                         {item.growth} growth this week
                       </p>
                     </div>
                   </div>
                   <div className="text-right">
                     <p className="text-3xl font-black text-slate-900 tracking-tighter">{item.cp.toLocaleString()}</p>
                     <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">CP Earned</p>
                   </div>
                 </div>
               ))}
             </div>
           </div>

           <div className="bg-blue-50 p-8 rounded-[2.5rem] border border-blue-100 flex items-center gap-6">
             <div className="text-4xl">📢</div>
             <div>
               <h4 className="font-black text-blue-900">Teacher's Tip</h4>
               <p className="text-sm text-blue-700 font-medium leading-relaxed">Class 5C is currently leading because 90% of students completed their AI Gap-Fill missions this week. Get 5A back in the game by finishing your 'Forces' investigation!</p>
             </div>
           </div>
        </div>
      )}

      {/* VIEW: SIGNIN (Only if not logged in) */}
      {!user && view === 'SIGNIN' && (
        <div className="fixed inset-0 bg-[#002046] flex items-center justify-center z-[100]">
           <div className="bg-white p-12 rounded-[3.5rem] text-center shadow-2xl max-w-sm w-full mx-4">
              <div className="text-7xl mb-6">🔭</div>
              <h1 className="text-4xl font-black mb-2 text-slate-900">Curiosity</h1>
              <p className="text-slate-400 font-bold uppercase text-[10px] tracking-[0.3em] mb-12">NLCS Jeju Portal</p>
              <div id="g-btn" ref={r => { if(r && window.google) {
                window.google.accounts.id.initialize({ client_id: CONFIG.GOOGLE_CLIENT_ID, callback: onGoogleLogin });
                window.google.accounts.id.renderButton(r, {theme:'outline', size:'large', shape:'pill', width: 250});
              }}}></div>
           </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
